function resolveSession(profile, sessionCount) {
  const pid = (profile && profile.programme_id) || 'new_mum';
  const list = programmeSessions(pid);
  const count = sessionCount || 0;
  const s = list[count % list.length];
  const perWeek = (profile && profile.days_per_week) || 4;
  const prog = PROGRAMMES.find(p => p.id === pid);
  return { ...s, week: Math.floor(count / perWeek) + 1, day: (count % perWeek) + 1,
    exerciseCount: s.exercises.length, programmeId: pid,
    programme: prog ? prog.name : 'Your programme', photo: prog ? prog.photo : 'photos/model-4.jpg' };

// ─── NATURAL LANGUAGE FOOD PARSER ────────────────────────────────────────────
function parseFood(text) {
  const WORD_QTY = {a:1,an:1,one:1,two:2,three:3,four:4,five:5,six:6,half:0.5,quarter:0.25,double:2,couple:2,large:1.4,big:1.4,small:0.65,medium:1,tiny:0.4,handful:0.5,few:3};
  const FILLERS = ['of','the','some','bit','piece','slice','slices','cup','cups','bowl','bowls','glass','glasses','serving','portion','scoop','tablespoon','tbsp','teaspoon','tsp','ml','grams','g','with','on'];

  const chunks = text.toLowerCase().trim().split(/\s*(?:\band\b|,|\+|\bthen\b|\bplus\b|\bwith\b|\bon\b)\s*/);
  const results = [];

  for (let chunk of chunks) {
    chunk = chunk.trim();
    if (!chunk || chunk.length < 2) continue;
    let qty = 1, food = chunk;

    // Leading integer or decimal
    const nm = food.match(/^(\d+\.?\d*)\s*/);
    if (nm) { qty = parseFloat(nm[1]); food = food.slice(nm[0].length).trim(); }

    // Leading word quantity
    for (const [word, val] of Object.entries(WORD_QTY)) {
      if (new RegExp(`^${word}\\b\\s*`,'i').test(food)) {
        qty *= val;
        food = food.replace(new RegExp(`^${word}\\b\\s*`,'i'),'').trim();
        break;
      }
    }

    // Strip filler words from the front
    let changed = true;
    while (changed) {
      changed = false;
      for (const f of FILLERS) {
        if (new RegExp(`^${f}\\s+`,'i').test(food)) {
          food = food.replace(new RegExp(`^${f}\\s+`,'i'),'').trim();
          changed = true;
        }
      }
    }
    if (!food) continue;

    // Match against FOOD_DB
    let best = null, bestScore = 0;
    for (const item of FOOD_DB) {
      for (const c of [item.n, ...item.a]) {
        let score = 0;
        if (food === c) score = 100;
        else if (food.startsWith(c) || c.startsWith(food)) score = 88;
        else if (food.includes(c) || c.includes(food)) score = 75 * Math.min(food.length,c.length)/Math.max(food.length,c.length);
        else {
          const fw = new Set(food.split(' ').filter(w=>w.length>2));
          const cw = c.split(' ').filter(w=>w.length>2);
          const overlap = cw.filter(w=>fw.has(w)).length;
          if (overlap) score = 55 * overlap / Math.max(fw.size,cw.length);
        }
        if (score > bestScore) { bestScore = score; best = item; }
      }
      if (bestScore===100) break;
    }

    if (best && bestScore >= 30) {
      const f = (best.g * qty) / 100;
      results.push({ id: Date.now()+Math.random(), name:best.n, displayQty:qty, kcal:Math.round(best.k*f), protein:Math.round(best.p*f*10)/10, carbs:Math.round(best.c*f*10)/10, fat:Math.round(best.f*f*10)/10, emoji:best.e, _item:best, qty });
    } else if (food.length > 2) {
      results.push({ id: Date.now()+Math.random(), name:food, displayQty:qty, kcal:Math.round(150*qty), protein:Math.round(8*qty*10)/10, carbs:Math.round(15*qty*10)/10, fat:Math.round(6*qty*10)/10, emoji:'🍽️', _item:null, qty, estimated:true });
    }
  }
  return results;
}

// ─── BRAIN MATRIX ────────────────────────────────────────────────────────────
function computeMatrix(answers) {
  const { lifeStage, goals = [], daysPerWeek, equipment, dietType } = answers;

  let primary = 'new_mum';
  let secondary = null;
  let reason = '';

  if (lifeStage === 'pregnant') {
    primary = 'pregnant';
    reason = "Because you're currently pregnant, SEZE has matched you with a trimester-adjusted programme that keeps you and your baby safe while maintaining your fitness and strength throughout each phase.";
  } else if (lifeStage === 'new_baby') {
    primary = 'new_mum';
    secondary = 'core';
    reason = "You're in your first six months post-birth — the most important window for recovery. SEZE's New Mum Reset is built specifically for this stage, with pelvic floor-first sequencing and safe progressive loading.";
  } else if (goals.includes('lose_fat') && goals.includes('build_muscle')) {
    primary = 'composition';
    reason = "You want to both lose fat and build muscle — that's body recomposition. SEZE's 12-week programme combines strength training with strategic cardio and nutrition-aligned macros to transform your composition simultaneously.";
  } else if (goals.includes('build_muscle') || goals.includes('gain_weight')) {
    primary = 'gain';
    reason = "Your goal is building visible muscle and strength. SEZE designed this programme to take on the cultural myth that lifting makes women 'bulky' — and to give you the lean, strong physique that comes from progressive overload.";
  } else if (goals.includes('lose_fat')) {
    primary = 'reset';
    reason = "Your goal is sustainable fat loss — not a crash diet. SEZE's Weight Reset is cycle-aware, preserves your muscle throughout, and builds habits that last long beyond the programme.";
  } else if (goals.includes('booty')) {
    primary = 'booty';
    reason = "You're focused on building your glutes and lower body strength. SEZE's Booty Building programme uses progressive overload across 8 weeks with pelvic floor integration in every session.";
  } else if (goals.includes('core') || goals.includes('pelvic_floor')) {
    primary = 'core';
    reason = "Core strength and pelvic floor health are your foundation — and SEZE's 6-week programme addresses both together. Whether you're post-natal or not, this transforms how you move in every other exercise.";
  } else {
    primary = 'composition';
    reason = "Based on your profile, SEZE recommends her all-over Body Composition programme — 12 weeks of strength and cardio hybrid training designed to reshape and strengthen your entire body.";
  }

  if (!secondary && primary !== 'core' && (lifeStage === 'post_baby_6_24' || lifeStage === 'post_baby_2plus')) {
    secondary = 'core';
  }

  // Macro calc — Mifflin-St Jeor (female), imperial-aware, life-stage SAFE
  const heightCm = answers.imperial ? (answers.height || 5.4) * 30.48 : (answers.height || 165);
  const weightKg = answers.imperial ? (answers.weight || 143) * 0.453592 : (answers.weight || 65);
  const age = answers.age || 30; // TODO collect DOB; safe demographic default
  const bmr = 10 * weightKg + 6.25 * heightCm - 5 * age - 161;
  const activityFactor = daysPerWeek >= 5 ? 1.725 : daysPerWeek >= 3 ? 1.55 : 1.375;
  const tdee = Math.round(bmr * activityFactor);
  // SAFETY: never prescribe a deficit for pregnancy or the breastfeeding window; add energy for both.
  const isPregnant = lifeStage === 'pregnant';
  const isNewMum   = lifeStage === 'new_baby';
  let kcal;
  if (isPregnant)                 kcal = tdee + 300;   // 2nd/3rd trimester energy need
  else if (isNewMum)              kcal = tdee + 330;   // lactation support
  else if (goals.includes('lose_fat'))                              kcal = tdee - 400;
  else if (goals.includes('build_muscle') || goals.includes('booty')) kcal = tdee + 250;
  else                            kcal = tdee;
  // Hard minimum floor — higher for perinatal stages, never below ~1300 for anyone
  const floor = (isPregnant || isNewMum || lifeStage === 'post_baby_6_24') ? 1600 : 1300;
  kcal = Math.max(floor, Math.round(kcal / 10) * 10);
  const protein = Math.round(weightKg * 1.8);
  const fat = Math.round(weightKg * 0.8);
  const carbs = Math.max(50, Math.round((kcal - protein * 4 - fat * 9) / 4)); // clamp, never negative

  const prog = PROGRAMMES.find(p => p.id === primary);
  const sec  = secondary ? PROGRAMMES.find(p => p.id === secondary) : null;

  return { primary: prog, secondary: sec, reason, tdee, kcal, protein, carbs, fat };
}

// ── ProgressRing ──────────────────────────────────────────────────────────────
function ProgressRing({ completed, total, size=96 }) {
  const r = (size / 2) - 10;
  const circ = 2 * Math.PI * r;
  const pct = total > 0 ? completed / total : 0;
  const [animated, setAnimated] = useState(0);

  useEffect(() => {
    let frame;
    let start = null;
    const duration = 900;
    const animate = (ts) => {
      if (!start) start = ts;
      const elapsed = ts - start;
      const progress = Math.min(elapsed / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3);
      setAnimated(eased * pct);
      if (progress < 1) frame = requestAnimationFrame(animate);
    };
    frame = requestAnimationFrame(animate);
    return () => cancelAnimationFrame(frame);
  }, [pct]);

  const offset = circ - animated * circ;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ display:'block' }}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.5)" strokeWidth="9"/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#E04486" strokeWidth="9"
        strokeDasharray={circ} strokeDashoffset={offset}
        strokeLinecap="round" transform={`rotate(-90 ${size/2} ${size/2})`}
        style={{ transition:'none' }}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#F8D0E4" strokeWidth="3"
        strokeDasharray={`${circ * 0.08} ${circ * 0.92}`} strokeLinecap="round"
        transform={`rotate(${-90 + animated * 360} ${size/2} ${size/2})`} opacity="0.9"/>
      <text x={size/2} y={size/2 - 5} textAnchor="middle" fill="#1A0D14"
        fontSize="17" fontFamily="Playfair Display, serif">{completed}/{total}</text>
      <text x={size/2} y={size/2 + 12} textAnchor="middle" fill="rgba(224,68,134,0.65)"
        fontSize="9" fontFamily="Inter, sans-serif">sessions</text>
    </svg>
  );
}

function Ic({ name, size=22, color='#E04486', stroke=1.7, fill='none' }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={color} strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink:0, color }}>
      {ICONS[name] || null}
    </svg>
  );
}

// ── MiniBarChart ──────────────────────────────────────────────────────────────
function MiniBarChart({ data }) {
  const max = Math.max(...data.map(d => d.sessions), 1);
  const H = 100, W = 280, barW = 32, gap = (W - data.length * barW) / (data.length + 1);
  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H + 24}`} style={{ display:'block' }}>
      {data.map((d, i) => {
        const x = gap + i * (barW + gap);
        const barH = (d.sessions / max) * H;
        const y = H - barH;
        return (
          <g key={i}>
            <rect x={x} y={y} width={barW} height={barH} rx="6" fill="#15B5A6" opacity="0.75"/>
            <text x={x + barW/2} y={H + 16} textAnchor="middle" fontFamily="Inter" fontSize="9" fill="rgba(26,13,20,0.5)">{d.week}</text>
            <text x={x + barW/2} y={y - 4} textAnchor="middle" fontFamily="Inter" fontSize="9" fill="#E04486">{d.sessions}</text>
          </g>
        );
      })}
    </svg>
  );
}

// ── Screen wrapper ────────────────────────────────────────────────────────────
function Screen({ children, pad=true, scrollable=true, withNav=false }) {

    <div className="fadeUp" style={{
      minHeight:'100vh',
      paddingBottom: withNav ? '90px' : 0,
      overflowY: scrollable ? 'auto' : 'hidden',
    }}>
      <div style={{ padding: pad ? '0 20px' : 0 }}>
        {children}
      </div>
    </div>
  );
}

// ── Login / Signup Screen ─────────────────────────────────────────────────────
function AuthScreen({ navigate, consentData, params }) {
  const [mode, setMode] = useState(params?.mode || 'login'); // 'login' | 'signup' | 'forgot'
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [name, setName] = useState('');
  const [loading, setLoading] = useState(null);
  const [error, setError] = useState('');
  const [showPassword, setShowPassword] = useState(false);

  const ROSA_URL = 'https://rosa-app-ten.vercel.app';
  const redirectTo = typeof window !== 'undefined' && window.location.hostname !== 'localhost' ? ROSA_URL : window.location.origin;

  const friendlyError = (e) => {
    const msg = e?.message || '';
    if (msg.includes('Failed to fetch') || msg.includes('NetworkError') || msg.includes('fetch'))
      return 'Connection error — please check your internet and try again.';
    if (msg.includes('Invalid login credentials'))
      return 'Incorrect email or password. Please try again.';
    if (msg.includes('Email not confirmed'))
      return 'Please verify your email first — check your inbox.';
    if (msg.includes('User already registered'))
      return 'An account with this email already exists. Try signing in instead.';
    if (msg.includes('Password should be'))
      return 'Password must be at least 6 characters.';
    if (msg.includes('rate limit') || msg.includes('too many'))
      return 'Too many attempts — please wait a minute and try again.';
    return msg || 'Something went wrong. Please try again.';
  };

  const handleEmail = async () => {
    if (!email || (mode !== 'forgot' && !password)) { setError('Please fill in all fields.'); return; }
    if (mode === 'signup' && !name.trim()) { setError('Please enter your name.'); return; }
    if (mode !== 'forgot' && password.length < 6) { setError('Password must be at least 6 characters.'); return; }
    setLoading('email');
    setError('');
    try {
      if (mode === 'signup') {
        const { data, error: err } = await supabase.auth.signUp({
          email, password,
          options: {
            emailRedirectTo: redirectTo,
            data: { full_name: name, marketing_consent: consentData?.marketing, gdpr_consent: true, gdpr_date: new Date().toISOString() }
          }
        });
        if (err) throw err;
        // Some Supabase configs auto-confirm — check if session exists immediately
        if (data?.session) {
          navigate('onboarding');
        } else {
          setMode('verify');
        }
      } else if (mode === 'login') {
        const { data, error: err } = await supabase.auth.signInWithPassword({ email, password });
        if (err) throw err;
        const { data: profile } = await supabase.from('rosa_users').select('onboarding_complete').eq('id', data.user.id).maybeSingle();
        navigate(profile?.onboarding_complete ? 'home' : 'onboarding');
      } else {
        const { error: err } = await supabase.auth.resetPasswordForEmail(email, { redirectTo });
        if (err) throw err;
        setMode('forgot_sent');
      }
    } catch (e) {
      setError(friendlyError(e));
    }
    setLoading(null);
  };

  const handleOAuth = async (provider) => {
    setLoading(provider);
    setError('');
    try {
      const { error: err } = await supabase.auth.signInWithOAuth({
        provider,
        options: { redirectTo, queryParams: provider === 'google' ? { access_type: 'offline', prompt: 'consent' } : undefined }
      });
      if (err) throw err;
      // OAuth opens a redirect — loading state stays until page reloads
    } catch (e) {
      setError(friendlyError(e));
      setLoading(null);
    }
  };

  // Verify email sent state
  if (mode === 'verify') {
    return (
      <AppBackground>
        <div style={{ minHeight:'100vh', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'40px 28px', textAlign:'center' }}>
          <div style={{ width:'80px', height:'80px', borderRadius:'50%', background:'rgba(224,68,134,0.1)', display:'flex', alignItems:'center', justifyContent:'center', marginBottom:'20px' }}><Ic name="mail" size={38} color="#E04486" stroke={1.6} /></div>
          <div style={{ fontFamily:'Playfair Display', fontSize:'28px', color:'#1A0D14', marginBottom:'8px' }}>Check your inbox.</div>
          <div style={{ fontFamily:'Inter', fontSize:'14px', fontWeight:300, color:'rgba(224,68,134,0.7)', lineHeight:1.7, marginBottom:'32px' }}>
            We've sent a verification link to <strong style={{ color:'#1A0D14' }}>{email}</strong>. Click it to activate your account, then come back here.
          </div>
          <PillButton variant="teal" onClick={() => navigate('onboarding')} style={{ width:'100%', maxWidth:'280px', padding:'14px' }}>
            I've verified — continue
          </PillButton>
          <button onClick={() => setMode('login')} style={{ fontFamily:'Inter', fontSize:'12px', color:'rgba(224,68,134,0.6)', background:'none', border:'none', cursor:'pointer', marginTop:'16px' }}>
            Back to login
          </button>
        </div>
      </AppBackground>
    );
  }

  if (mode === 'forgot_sent') {
    return (
      <AppBackground>
        <div style={{ minHeight:'100vh', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'40px 28px', textAlign:'center' }}>
          <div style={{ width:'80px', height:'80px', borderRadius:'50%', background:'rgba(224,68,134,0.1)', display:'flex', alignItems:'center', justifyContent:'center', marginBottom:'20px' }}><Ic name="key" size={38} color="#E04486" stroke={1.6} /></div>
          <div style={{ fontFamily:'Playfair Display', fontSize:'28px', color:'#1A0D14', marginBottom:'8px' }}>Reset link sent.</div>
          <div style={{ fontFamily:'Inter', fontSize:'14px', fontWeight:300, color:'rgba(224,68,134,0.7)', lineHeight:1.7, marginBottom:'32px' }}>
            Check your email for a password reset link.
          </div>
          <PillButton variant="teal" onClick={() => setMode('login')} style={{ width:'100%', maxWidth:'280px', padding:'14px' }}>
            Back to login
          </PillButton>
        </div>
      </AppBackground>
    );
  }

  return (
    <AppBackground>
      <div style={{ minHeight:'100vh', display:'flex', flexDirection:'column', padding:'0 24px 32px' }}>
        {/* Header */}
        <div style={{ paddingTop:'60px', marginBottom:'28px' }}>
          <div style={{ marginBottom:'24px', textAlign:'center' }}><SezeLogo size="small" color="#E04486" tagline={false} /></div>
          <div style={{ fontFamily:'Playfair Display', fontSize:'30px', fontWeight:700, color:'#1A0D14', lineHeight:1.1, marginBottom:'6px' }}>
            {mode === 'signup' ? 'Create your account' : mode === 'forgot' ? 'Reset your password' : 'Welcome back'}
          </div>
          <div style={{ fontFamily:'Inter', fontSize:'14px', color:'rgba(26,13,20,0.55)' }}>
            {mode === 'signup' ? 'Start your journey with SEZE.' : mode === 'forgot' ? "We'll email you a reset link." : 'Sign in to keep your momentum.'}
          </div>
        </div>

        {/* OAuth buttons */}
        {mode !== 'forgot' && (
          <div style={{ display:'flex', flexDirection:'column', gap:'10px', marginBottom:'20px' }}>
            <OAuthButton provider="google" label="Continue with Google" loading={loading==='google'} onClick={() => handleOAuth('google')} />
            <OAuthButton provider="apple"  label="Continue with Apple"  comingSoon />
            <OAuthButton provider="facebook" label="Continue with Meta" comingSoon />
          </div>
        )}

        {/* Divider */}
        {mode !== 'forgot' && (
          <div style={{ display:'flex', alignItems:'center', gap:'12px', marginBottom:'20px' }}>
            <div style={{ flex:1, height:'0.5px', background:'rgba(224,68,134,0.4)' }} />
            <span style={{ fontFamily:'Inter', fontSize:'11px', color:'rgba(224,68,134,0.55)' }}>or with email</span>
            <div style={{ flex:1, height:'0.5px', background:'rgba(224,68,134,0.4)' }} />
          </div>
        )}

        {/* Email form */}
        <div style={{ display:'flex', flexDirection:'column', gap:'10px', marginBottom:'16px' }}>
          {mode === 'signup' && (
            <AuthInput placeholder="Full name" value={name} onChange={setName} type="text" icon="user" />
          )}
          <AuthInput placeholder="Email address" value={email} onChange={setEmail} type="email" icon="mail" />
          {mode !== 'forgot' && (
            <AuthInput placeholder="Password" value={password} onChange={setPassword}
              type={showPassword ? 'text' : 'password'} icon="lock"
              rightAction={{ label: showPassword ? 'Hide' : 'Show', onClick: () => setShowPassword(!showPassword) }} />
          )}
        </div>

        {error && (
          <div style={{ padding:'10px 14px', borderRadius:'10px', background:'rgba(248,100,100,0.12)', border:'0.5px solid rgba(248,100,100,0.3)', fontFamily:'Inter', fontSize:'12px', color:'#c0392b', marginBottom:'12px' }}>
            {error}
          </div>
        )}

        {mode === 'login' && (
          <button onClick={() => { setMode('forgot'); setError(''); }}
            style={{ fontFamily:'Inter', fontSize:'12px', color:'rgba(224,68,134,0.7)', background:'none', border:'none', cursor:'pointer', textAlign:'right', marginBottom:'12px' }}>
            Forgot password?
          </button>
        )}

        <PillButton variant="teal" onClick={handleEmail} style={{ width:'100%', padding:'15px', fontSize:'14px', marginBottom:'16px' }}>
          {loading === 'email' ? 'Please wait…' : mode === 'signup' ? 'Create account' : mode === 'forgot' ? 'Send reset link' : 'Sign in'}
        </PillButton>

        {/* Toggle login/signup */}
        {mode !== 'forgot' ? (
          <div style={{ textAlign:'center' }}>
            <span style={{ fontFamily:'Inter', fontSize:'13px', color:'rgba(224,68,134,0.7)' }}>
              {mode === 'login' ? "Don't have an account? " : 'Already have an account? '}
            </span>
            <button onClick={() => { setMode(mode === 'login' ? 'signup' : 'login'); setError(''); }}
              style={{ fontFamily:'Inter', fontSize:'13px', fontWeight:500, color:'#E04486', background:'none', border:'none', cursor:'pointer' }}>
              {mode === 'login' ? 'Sign up' : 'Sign in'}
            </button>
          </div>
        ) : (
          <button onClick={() => { setMode('login'); setError(''); }}
            style={{ fontFamily:'Inter', fontSize:'13px', color:'rgba(224,68,134,0.7)', background:'none', border:'none', cursor:'pointer', textAlign:'center', width:'100%' }}>
            ← Back to sign in
          </button>
        )}

        {/* Legal note */}
        <div style={{ marginTop:'auto', paddingTop:'24px', textAlign:'center' }}>
          <span style={{ fontFamily:'Inter', fontSize:'10px', color:'rgba(224,68,134,0.45)', lineHeight:1.6 }}>
            Protected by reCAPTCHA. GDPR compliant. Your data is never sold.<br/>
            <span style={{ textDecoration:'underline', cursor:'pointer' }}>Privacy Policy</span> · <span style={{ textDecoration:'underline', cursor:'pointer' }}>Terms of Service</span>
          </span>
        </div>
      </div>
    </AppBackground>
  );
}

// ─── ONBOARDING ───────────────────────────────────────────────────────────────
function OnboardingScreen({ navigate }) {
  const [step, setStep] = useState(1);
  const TOTAL = 7;
  const [answers, setAnswers] = useState({
    lifeStage: null,
    height: 165,
    weight: 65,
    imperial: false,
    bodyType: null,
    goals: [],
    daysPerWeek: 3,
    sessionLength: 45,
    equipment: 'gym',
    dietType: 'omnivore',
    allergies: [],
  });
  const [matrix, setMatrix] = useState(null);
  const [revealing, setRevealing] = useState(false);
  const [revealed, setRevealed] = useState(false);

  const update = (key, val) => setAnswers(a => ({ ...a, [key]: val }));

  const next = () => {
    if (step === 6) {
      setStep(7);
      setRevealing(true);
      setTimeout(() => {
        setMatrix(computeMatrix(answers));
        setRevealing(false);
        setRevealed(true);
      }, 2200);
    } else if (step < TOTAL) {
      setStep(s => s + 1);
    } else {
      // Persist the full onboarding profile + computed macro targets to Supabase (rosa_users).
      // Single source of truth = computeMatrix (safe, life-stage aware). Upsert so a missing row is created.
      supabase.auth.getSession().then(({ data: { session } }) => {
        if (!session) { navigate('home'); return; }
        const m = matrix || computeMatrix(answers);
        const kg = answers.imperial ? (answers.weight || 143) * 0.453592 : (answers.weight || 65);
        const cm = answers.imperial ? (answers.height || 5.4) * 30.48 : (answers.height || 165);
        const days = answers.daysPerWeek || 3;
        const ls = answers.lifeStage;
        const primaryGoal = ls === 'pregnant' ? 'pregnancy'
          : (ls === 'new_baby' || ls === 'post_baby_6_24') ? 'postnatal'
          : answers.goals.includes('lose_fat') ? 'weight_loss'
          : (answers.goals.includes('build_muscle') || answers.goals.includes('booty')) ? 'muscle_gain'
          : 'maintenance';
        supabase.from('rosa_users').upsert({
          id: session.user.id,
          onboarding_complete: true,
          life_stage: answers.lifeStage,
          goals: answers.goals,
          goal: primaryGoal,
          dietary_preference: answers.dietType || 'omnivore',
          allergies: answers.allergies,
          body_type: answers.bodyType,
          programme_id: m.primary && m.primary.id,
          height_cm: Math.round(cm),
          starting_weight_kg: Math.round(kg * 10) / 10,
          days_per_week: days,
          session_length: answers.sessionLength,
          equipment: answers.equipment,
          activity_level: days >= 5 ? 'active' : days >= 3 ? 'moderate' : 'light',
          tdee_kcal: m.tdee,
          target_kcal: m.kcal,
          target_protein_g: m.protein,
          target_carbs_g: m.carbs,
          target_fat_g: m.fat,
          updated_at: new Date().toISOString(),
        }, { onConflict: 'id' }).then(({ error }) => { if (error) console.error('[onboarding save]', error.message); navigate('home'); });
      });
    }
  };
  const back = () => step > 1 && setStep(s => s - 1);

  const canContinue = () => {
    if (step === 2) return !!answers.lifeStage;
    if (step === 4) return answers.goals.length > 0;
    return true;
  };

  return (
    <AppBackground>
      <div style={{ minHeight:'100vh', display:'flex', flexDirection:'column', padding:'0 20px 32px' }}>
        {/* Header */}
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', paddingTop:'56px', paddingBottom:'24px' }}>
          {step > 1
            ? <button onClick={back} style={{ background:'none', border:'none', cursor:'pointer', padding:'4px' }}><BackIcon /></button>
            : <div style={{ width:'28px' }} />}
          <div style={{ flex:1, marginLeft:'12px', display:'flex', alignItems:'center', gap:'10px' }}>
            <div style={{ flex:1, height:'6px', borderRadius:'3px', background:'rgba(21,181,166,0.18)', overflow:'hidden' }}>
              <div style={{ height:'100%', width:`${(step/TOTAL)*100}%`, background:'#15B5A6', borderRadius:'3px', transition:'width 0.3s ease' }} />
            </div>
            <span style={{ fontFamily:'Inter', fontSize:'12px', fontWeight:600, color:'rgba(26,13,20,0.5)' }}>{step}/{TOTAL}</span>
          </div>
        </div>

        {/* Step content */}
        <div key={step} className="slideL" style={{ flex:1, display:'flex', flexDirection:'column' }}>
          {step === 1 && <Step1 />}
          {step === 2 && <Step2 answers={answers} update={update} />}
          {step === 3 && <Step3 answers={answers} update={update} />}
          {step === 4 && <Step4 answers={answers} update={update} />}
          {step === 5 && <Step5 answers={answers} update={update} />}
          {step === 6 && <Step6 answers={answers} update={update} />}
          {step === 7 && <Step7 revealing={revealing} revealed={revealed} matrix={matrix} answers={answers} />}
        </div>

        {/* CTA */}
        {!(step === 7 && !revealed) && (
          <div style={{ paddingTop:'20px' }}>
            {step === 7 && revealed
              ? <PillButton variant="teal" onClick={next} style={{ width:'100%', padding:'16px' }}>Let's start →</PillButton>
              : step < 7
                ? <PillButton variant="teal" onClick={next} disabled={!canContinue()} style={{ width:'100%', padding:'16px' }}>
                    {step === 6 ? 'Find my match' : 'Continue'}
                  </PillButton>
                : null}
          </div>
        )}
      </div>
    </AppBackground>
  );
}

// ─── WORKOUT PLAYER ───────────────────────────────────────────────────────────
function WorkoutPlayerScreen({ navigate }) {
  const app = useAppData();
  // Resolve THIS user's current session from their programme + progress (stable per mount)
  const session = useRef(resolveSession(app && app.profile, app && app.sessionCount)).current;
  const EXERCISES = session.exercises;
  const TODAY_SESSION = session;
  const [exIdx, setExIdx] = useState(0);
  const [setsDone, setSetsDone] = useState(0);
  const [resting, setResting] = useState(false);
  const [timeLeft, setTimeLeft] = useState(0);
  const [done, setDone] = useState(false);
  const [cleared, setCleared] = useState(false);
  const [weights, setWeights] = useState(EXERCISES.map(e => e.weight));
  const timerRef = useRef(null);

  const ex = EXERCISES[exIdx];
  const totalSets = ex.sets;
  const progress = (exIdx / EXERCISES.length) * 100 + (setsDone / (totalSets * EXERCISES.length)) * 100;

  const startRest = useCallback(() => {
    if (ex.rest === 0) {
      advanceSet();
      return;
    }
    setResting(true);
    setTimeLeft(ex.rest);
    timerRef.current = setInterval(() => {
      setTimeLeft(t => {
        if (t <= 1) {
          clearInterval(timerRef.current);
          setResting(false);
          advanceSet();
          return 0;
        }
        return t - 1;
      });
    }, 1000);
  }, [ex, setsDone, exIdx]);

  const advanceSet = useCallback(() => {
    setSetsDone(s => {
      const next = s + 1;
      if (next >= totalSets) {
        if (exIdx >= EXERCISES.length - 1) {
          setDone(true);
        } else {
          setExIdx(i => i + 1);
        }
        return 0;
      }
      return next;
    });
  }, [totalSets, exIdx]);

  const skipRest = () => {
    if (timerRef.current) clearInterval(timerRef.current);
    setResting(false);
    advanceSet();
  };

  useEffect(() => () => { if (timerRef.current) clearInterval(timerRef.current); }, []);

  // Log the completed session to Supabase exactly once when finished
  const loggedRef = useRef(false);
  useEffect(() => {
    if (!done || loggedRef.current) return;
    loggedRef.current = true;
    supabase.auth.getSession().then(({ data: { session } }) => {
      if (!session) return;
      supabase.from('rosa_sessions').insert({
        user_id: session.user.id,
        programme_id: session.programmeId,
        session_name: TODAY_SESSION.name,
        week: TODAY_SESSION.week,
        day: TODAY_SESSION.day,
        duration_mins: TODAY_SESSION.duration,
        exercises: EXERCISES.map((e, i) => ({ name: e.name, sets: e.sets, reps: e.reps, weight: weights[i] })),
        completed_at: new Date().toISOString(),
      }).then(({ error }) => { if (error) console.error('[session log]', error.message); });
    });
  }, [done]);

  if (done) {
    return (
      <AppBackground>
        <div style={{ minHeight:'100vh', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'40px 20px', textAlign:'center' }}>
          <div style={{ width:'88px', height:'88px', borderRadius:'50%', background:'#E04486', display:'flex', alignItems:'center', justifyContent:'center', marginBottom:'20px', animation:'badgePop 0.6s ease-out', boxShadow:'0 8px 24px rgba(224,68,134,0.4)' }}><Ic name="trophy" size={44} color="#FFFFFF" stroke={1.6} /></div>
          <div style={{ fontFamily:'Playfair Display', fontSize:'36px', color:'#1A0D14', marginBottom:'8px' }}>Session complete!</div>
          <div style={{ fontFamily:'Inter', fontSize:'14px', fontWeight:300, color:'rgba(224,68,134,0.7)', marginBottom:'8px' }}>You showed up, {USER.name}. That's everything.</div>
          <div style={{ fontFamily:'Playfair Display', fontSize:'15px', color:'rgba(224,68,134,0.8)', fontStyle:'italic', marginBottom:'32px' }}>
            "You're stronger than yesterday."
          </div>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'10px', width:'100%', marginBottom:'28px' }}>
            {[{l:'Exercises',v:EXERCISES.length},{l:'Sets',v:EXERCISES.reduce((a,e)=>a+e.sets,0)},{l:'Duration',v:`${TODAY_SESSION.duration}m`},{l:'Week',v:`${session.week}`}].map(s => (
              <GlassCard key={s.l} style={{ textAlign:'center' }}>
                <div style={{ fontFamily:'Playfair Display', fontSize:'28px', color:'#1A0D14' }}>{s.v}</div>
                <div style={{ fontFamily:'Inter', fontSize:'10px', textTransform:'uppercase', letterSpacing:'0.08em', color:'rgba(224,68,134,0.6)', marginTop:'4px' }}>{s.l}</div>
              </GlassCard>
            ))}
          </div>
          <PillButton onClick={() => navigate('home')} style={{ width:'100%', padding:'15px' }}>Back to home →</PillButton>
        </div>
      </AppBackground>
    );
  }

  const setPct = totalSets > 0 ? setsDone / totalSets : 0;
  const RR = 116, RC = 2 * Math.PI * RR;
  const elapsedMin = Math.round((progress / 100) * TODAY_SESSION.duration);
  const remainMin = Math.max(0, TODAY_SESSION.duration - elapsedMin);
  const goPrev = () => { if (timerRef.current) clearInterval(timerRef.current); setResting(false); setSetsDone(0); setExIdx(i => Math.max(0, i - 1)); };
  const goNext = () => { if (timerRef.current) clearInterval(timerRef.current); setResting(false); setSetsDone(0); if (exIdx < EXERCISES.length - 1) setExIdx(i => i + 1); else setDone(true); };

  return (
    <div style={{ minHeight:'100vh', background:'radial-gradient(120% 80% at 50% 0%, #241a3d 0%, #17122b 55%, #120e22 100%)', display:'flex', flexDirection:'column', padding:'0 22px 30px' }}>

          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.55)" strokeWidth="1.8" strokeLinecap="round"><path d="M9 18V5l10-2v13" /><circle cx="6" cy="18" r="3" /><circle cx="16" cy="16" r="3" /></svg>

          <div style={{ fontFamily:'Inter', fontSize:'13px', fontWeight:600, textTransform:'uppercase', letterSpacing:'0.14em', color:'#F26FA6' }}>Rest</div>

function getMealSlot() {
  const h = new Date().getHours();
  if (h >= 6  && h < 11) return 'breakfast';
  if (h >= 11 && h < 15) return 'lunch';
  if (h >= 17 && h < 22) return 'dinner';
  return 'snack';
}

function FoodCameraButton({ onResult, disabled }) {
  const fileRef = React.useRef(null);
  const [loading, setLoading] = useState(false);

  const handleFile = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setLoading(true);
    try {
      const base64 = await new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = () => res(r.result.split(',')[1]);
        r.onerror = rej;
        r.readAsDataURL(file);
      });
      const resp = await fetch(`${ROSA_EDGE_URL}/analyze-image`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image_base64: base64, media_type: file.type || 'image/jpeg', mode: 'food' }),
      });
      const data = await resp.json();
      const items = Array.isArray(data.parsed) ? data.parsed : [];
      if (items.length > 0) {
        onResult(items.map((it, i) => ({ ...it, id: Date.now() + i, displayQty: 1, source: 'photo' })));
      } else {
        onResult([{ id: Date.now(), name: 'Meal from photo', kcal: 400, protein: 20, carbs: 40, fat: 12, emoji: '📸', displayQty: 1, source: 'photo' }]);
      }
    } catch (_) {
      onResult([{ id: Date.now(), name: 'Meal from photo', kcal: 400, protein: 20, carbs: 40, fat: 12, emoji: '📸', displayQty: 1, source: 'photo' }]);
    } finally {
      setLoading(false);
      e.target.value = '';
    }
  };

  return (
    <>
      <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={handleFile} style={{ display:'none' }} />
      <button onClick={() => fileRef.current?.click()} disabled={disabled || loading} aria-label="Scan food photo"
        style={{ width:'48px', height:'48px', borderRadius:'14px', background:'#15B5A6', border:'none', display:'flex', alignItems:'center', justifyContent:'center', cursor: disabled ? 'default' : 'pointer', flexShrink:0, opacity: disabled ? 0.5 : 1 }}>
        {loading ? <div style={{ width:'16px', height:'16px', border:'2px solid rgba(255,255,255,0.4)', borderTopColor:'#fff', borderRadius:'50%', animation:'spin 0.8s linear infinite' }} /> : <Ic name="camera" size={20} color="#FFFFFF" stroke={1.8} />}
      </button>
    </>
  );
}

function NutritionScreen({ navigate }) {
  const app = useAppData();
  const [tab, setTab] = useState('log');
  const [dietFilter, setDietFilter] = useState('All');
  const [selectedMeal, setSelectedMeal] = useState(null);
  const [kitchenLogged, setKitchenLogged] = useState([]);
  const [searchQ, setSearchQ] = useState('');
  // AI logger state

  const [aiState, setAiState] = useState('idle'); // idle | thinking | review | photo
  const [parsedItems, setParsedItems] = useState([]);
  const [loggedItems, setLoggedItems] = useState([]);
  // Load today's real logged meals from Supabase (via the app data provider)
  useEffect(() => {
    if (!app || !app.meals) return;
    setLoggedItems(app.meals.map((m, i) => ({
      _id: m.id || `srv-${i}`, name: m.meal_name, slot: m.meal_type || 'snack',
      time: (m.logged_at || '').slice(11, 16),
      kcal: m.kcal || 0, protein: Number(m.protein) || 0, carbs: Number(m.carbs) || 0, fat: Number(m.fat) || 0,
      portions: m.portions,
    })));
  }, [app && app.meals]);

  const totals = loggedItems.reduce((a,m) => ({ kcal:a.kcal+m.kcal, protein:a.protein+m.protein, carbs:a.carbs+m.carbs, fat:a.fat+m.fat }), { kcal:0, protein:0, carbs:0, fat:0 });
  const targets = {
    kcal: (app && app.profile && app.profile.target_kcal) || USER.macros.kcalTarget,
    protein: (app && app.profile && app.profile.target_protein_g) || USER.macros.proteinTarget,
    carbs: (app && app.profile && app.profile.target_carbs_g) || USER.macros.carbsTarget,
    fat: (app && app.profile && app.profile.target_fat_g) || USER.macros.fatTarget,
  };

  const submitAI = (inputText) => {
    const t = (inputText || aiInput).trim();
    if (!t) return;
    setAiState('thinking');
    setTimeout(() => {
      const items = parseFood(t);
      if (items.length === 0) {
        setParsedItems([{ id: Date.now(), name: t, kcal:150, protein:8, carbs:15, fat:6, emoji:'🍽️', estimated:true, displayQty:1 }]);
      } else {
        setParsedItems(items);
      }
      setAiState('review');
    }, 700);
  };

  const confirmLog = () => {
    const now = new Date();
    const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    const slot = getMealSlot();
    const loggedDate = now.toISOString().split('T')[0];
    const newItems = parsedItems.map(item => ({ ...item, _id: Date.now()+Math.random(), slot, time: timeStr }));
    setLoggedItems(prev => [...prev, ...newItems]);
    setParsedItems([]);
    setAiInput('');
    setAiState('idle');
    supabase.auth.getSession().then(({ data: { session } }) => {
      if (!session) return;
      const rows = newItems.map(item => ({
        user_id: session.user.id, meal_name: item.name, meal_type: slot, logged_date: loggedDate,
        kcal: Math.round(item.kcal), protein: item.protein, carbs: item.carbs, fat: item.fat,
        portions: item.displayQty || 1, source: item.source || 'text_ai',
      }));
      supabase.from('rosa_nutrition_logs').insert(rows).then(({ error }) => {
        if (error) console.error('[nutrition log]', error.message);
        else if (app && app.refresh) app.refresh();
      });
    });
  };

  const handlePhotoResult = (items) => {
    setParsedItems(items);
    setAiState('review');
  };

  const removeLogged = (id) => setLoggedItems(prev => prev.filter(m => m._id !== id));
  const updateParsedQty = (id, delta) => {
    setParsedItems(prev => prev.map(item => {
      if (item.id !== id) return item;
      const newQty = Math.max(0.5, (item.displayQty || 1) + delta);
      const ratio = newQty / (item.displayQty || 1);
      return { ...item, displayQty:newQty, kcal:Math.round(item.kcal*ratio), protein:Math.round(item.protein*ratio*10)/10, carbs:Math.round(item.carbs*ratio*10)/10, fat:Math.round(item.fat*ratio*10)/10 };
    }));
  };

  const dietOpts = ['All','Vegan','Vegetarian','Pescetarian','Omnivore'];
  const filtered = KITCHEN_MEALS.filter(m => {
    const dMatch = dietFilter === 'All' || m.diet.includes(dietFilter.toLowerCase());
    const sMatch = !searchQ || m.name.toLowerCase().includes(searchQ.toLowerCase());
    return dMatch && sMatch;
  });

  if (selectedMeal) {
    return <MealDetail meal={selectedMeal} onBack={() => setSelectedMeal(null)}
      onLog={() => {
        const now = new Date();
        const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        setLoggedItems(l => [...l, { ...selectedMeal, _id: Date.now(), slot: getMealSlot(), time: timeStr }]);
        setKitchenLogged(l => [...l, selectedMeal.id]);
        supabase.auth.getSession().then(({ data: { session } }) => {
          if (!session) return;
          supabase.from('rosa_nutrition_logs').insert({
            user_id: session.user.id, meal_name: selectedMeal.name, meal_type: getMealSlot(),
            logged_date: now.toISOString().split('T')[0],
            kcal: selectedMeal.kcal, protein: selectedMeal.protein, carbs: selectedMeal.carbs, fat: selectedMeal.fat,
            portions: 1, source: 'manual',
          }).then(({ error }) => { if (error) console.error('[kitchen log]', error.message); else if (app && app.refresh) app.refresh(); });
        });
        setSelectedMeal(null);
      }}
      logged={kitchenLogged.includes(selectedMeal.id)} />;
  }

  const pct = (v,t) => Math.min(100, Math.round((v/(t||1))*100));
  const remaining = targets.kcal - totals.kcal;
  const overTarget = remaining < 0;

  return (
    <AppBackground>
      <Screen withNav>

          </div>
        </div>

        {/* Calorie ring */}
        {(() => {
          const kp = Math.min(totals.kcal / (targets.kcal || 1), 1);
          const R = 82, C = 2 * Math.PI * R;
          return (
            <div style={{ display:'flex', justifyContent:'center', marginBottom:'20px' }}>
              <div style={{ position:'relative', width:'208px', height:'208px' }}>

                </svg>

                  <div style={{ fontFamily:'Inter', fontSize:'11px', color:'rgba(26,13,20,0.4)' }}>Today</div>
                  <div style={{ fontFamily:'Playfair Display', fontSize:'42px', color:'#1A0D14', lineHeight:1.05 }}>{totals.kcal}</div>
                  <div style={{ fontFamily:'Inter', fontSize:'12px', color:'rgba(26,13,20,0.45)' }}>/ {targets.kcal} kcal</div>
                  <div style={{ fontFamily:'Inter', fontSize:'13px', fontWeight:600, color: overTarget ? '#e05c7a' : '#E04486', marginTop:'5px' }}>{overTarget ? `${Math.abs(remaining)} over` : `${Math.round(kp*100)}% of goal`}</div>

          );

        {/* Macro row */}
        <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:'10px', marginBottom:'18px' }}>
          {[{l:'Protein',v:totals.protein,t:targets.protein,c:'#15B5A6'},{l:'Carbs',v:totals.carbs,t:targets.carbs,c:'#F26FA6'},{l:'Fat',v:totals.fat,t:targets.fat,c:'#B72B6D'}].map(m => (

            </div>
          ))}
        </div>

        {/* Tabs */}
        <div style={{ display:'flex', borderRadius:'24px', background:'rgba(255,255,255,0.4)', padding:'3px', marginBottom:'16px' }}>
          {[{id:'log',label:'AI Log'},{id:'kitchen',label:'Kitchen'},{id:'menu',label:'Menu Scanner'}].map(t => (
            <button key={t.id} onClick={() => setTab(t.id)}
              style={{ flex:1, padding:'9px', borderRadius:'20px', fontFamily:'Inter', fontSize:'12px', fontWeight:500, cursor:'pointer', background: tab===t.id ? '#E04486' : 'transparent', color: tab===t.id ? '#FFFFFF' : 'rgba(224,68,134,0.7)', border:'none', transition:'all 0.2s' }}>
              {t.label}
            </button>
          ))}
        </div>

        {tab === 'log' && (
          <CalorieLogTab aiInput={aiInput} setAiInput={setAiInput} aiState={aiState} parsedItems={parsedItems}
            onSubmit={submitAI} onConfirm={confirmLog} onCancel={() => { setParsedItems([]); setAiState('idle'); }}
            onUpdateQty={updateParsedQty} loggedItems={loggedItems} onRemove={removeLogged}
            onPhotoResult={handlePhotoResult} />
        )}
        {tab === 'menu' && <MenuScannerTab userGoal="general health" />}
        {tab === 'kitchen' && (
          <KitchenTab dietFilter={dietFilter} setDietFilter={setDietFilter} dietOpts={dietOpts} filtered={filtered}
            searchQ={searchQ} setSearchQ={setSearchQ} setSelectedMeal={setSelectedMeal} loggedMeals={kitchenLogged} />
        )}
      </Screen>
      <BottomNav active="nutrition" navigate={navigate} />
    </AppBackground>
  );
}

function CalorieLogTab({ aiInput, setAiInput, aiState, parsedItems, onSubmit, onConfirm, onCancel, onUpdateQty, loggedItems, onRemove, onPhotoResult }) {
  const inputRef = useRef(null);

  const handleKey = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); onSubmit(); } };

  const grouped = MEAL_SLOTS.map(slot => ({
    ...slot,
    items: loggedItems.filter(m => m.slot === slot.id),
  })).filter(s => s.items.length > 0);

  return (
    <div>
      {/* AI input card */}
      <GlassCard strong style={{ marginBottom:'12px', padding:'14px' }}>
        <div style={{ display:'flex', alignItems:'center', gap:'8px', marginBottom:'10px' }}>

          <div>
            <div style={{ fontFamily:'Inter', fontSize:'12px', fontWeight:600, color:'#1A0D14' }}>Tell SEZE what you ate</div>
            <div style={{ fontFamily:'Inter', fontSize:'10px', color:'rgba(224,68,134,0.6)' }}>Type naturally — "2 eggs on toast with a latte"</div>

        </div>
        <textarea ref={inputRef} value={aiInput} onChange={e => setAiInput(e.target.value)} onKeyDown={handleKey}
          placeholder="e.g. &quot;a bowl of porridge with blueberries and honey, then a coffee&quot;"
          disabled={aiState !== 'idle'}
          style={{ width:'100%', minHeight:'72px', padding:'10px 12px', borderRadius:'12px', border:'0.5px solid rgba(224,68,134,0.4)', background:'rgba(255,245,248,0.3)', fontFamily:'Inter', fontSize:'13px', color:'#1A0D14', resize:'none', outline:'none', boxSizing:'border-box', lineHeight:1.5 }} />
        <div style={{ marginTop:'10px', display:'flex', gap:'8px' }}>
          <button onClick={() => onSubmit()}
            disabled={!aiInput.trim() || aiState !== 'idle'}

            {aiState === 'thinking' ? 'Calculating…' : 'Analyse & log'}
          </button>
          <FoodCameraButton onResult={onPhotoResult} disabled={aiState !== 'idle'} />
        </div>
      </GlassCard>

      {/* Quick add chips */}
      {aiState === 'idle' && (
        <div style={{ marginBottom:'16px' }}>
          <div style={{ fontFamily:'Inter', fontSize:'10px', fontWeight:600, textTransform:'uppercase', letterSpacing:'0.1em', color:'rgba(224,68,134,0.5)', marginBottom:'8px' }}>Quick add</div>
          <div style={{ display:'flex', flexWrap:'wrap', gap:'6px' }}>
            {QUICK_FOODS.map(f => (
              <button key={f.label} onClick={() => onSubmit(f.text)}
                style={{ padding:'7px 12px', borderRadius:'20px', background:'rgba(255,255,255,0.55)', border:'0.5px solid rgba(224,68,134,0.35)', fontFamily:'Inter', fontSize:'11px', color:'#1A0D14', cursor:'pointer', whiteSpace:'nowrap' }}>
                {f.label}
              </button>
            ))}
          </div>
        </div>
      )}

      {/* Review parsed items */}
      {aiState === 'review' && parsedItems.length > 0 && (
        <GlassCard style={{ marginBottom:'16px', padding:'14px' }}>
          <div style={{ fontFamily:'Inter', fontSize:'11px', fontWeight:600, textTransform:'uppercase', letterSpacing:'0.1em', color:'rgba(224,68,134,0.6)', marginBottom:'10px' }}>SEZE found {parsedItems.length} item{parsedItems.length>1?'s':''}</div>
          <div style={{ display:'flex', flexDirection:'column', gap:'8px', marginBottom:'12px' }}>
            {parsedItems.map(item => (
              <div key={item.id} style={{ display:'flex', alignItems:'center', gap:'10px', padding:'10px 12px', borderRadius:'12px', background:'rgba(255,255,255,0.45)', border:'0.5px solid rgba(224,68,134,0.2)' }}>
                <div style={{ width:'36px', height:'36px', borderRadius:'10px', background:'rgba(224,68,134,0.08)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}><Ic name="utensils" size={18} color="#E04486" stroke={1.7} /></div>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontFamily:'Inter', fontSize:'12px', fontWeight:500, color:'#1A0D14', textTransform:'capitalize' }}>{item.name}</div>

                </div>
                <div style={{ display:'flex', alignItems:'center', gap:'6px', flexShrink:0 }}>

                  <span style={{ fontFamily:'Inter', fontSize:'12px', fontWeight:600, color:'#1A0D14', minWidth:'20px', textAlign:'center' }}>{item.displayQty}</span>
                  <button onClick={() => onUpdateQty(item.id,0.5)} style={{ width:'24px', height:'24px', borderRadius:'50%', background:'rgba(224,68,134,0.3)', border:'none', fontFamily:'Inter', fontSize:'14px', color:'#E04486', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>+</button>

              </div>
            ))}

          <div style={{ padding:'8px 12px', borderRadius:'10px', background:'rgba(224,68,134,0.15)', marginBottom:'12px' }}>
            <span style={{ fontFamily:'Inter', fontSize:'12px', color:'rgba(26,13,20,0.7)' }}>
              Total: <strong style={{ color:'#1A0D14' }}>{parsedItems.reduce((a,i)=>a+i.kcal,0)} kcal</strong>
              &nbsp;· {Math.round(parsedItems.reduce((a,i)=>a+i.protein,0)*10)/10}g protein
            </span>
          </div>
          <div style={{ display:'flex', gap:'8px' }}>
            <button onClick={onCancel} style={{ flex:1, padding:'11px', borderRadius:'20px', background:'rgba(224,68,134,0.2)', border:'none', fontFamily:'Inter', fontSize:'12px', color:'rgba(224,68,134,0.7)', cursor:'pointer' }}>Edit</button>
            <button onClick={onConfirm} style={{ flex:2, padding:'11px', borderRadius:'20px', background:'linear-gradient(135deg,#E04486,#B72B6D)', border:'none', fontFamily:'Inter', fontSize:'13px', fontWeight:500, color:'#FFFFFF', cursor:'pointer' }}>✓ Log it all</button>
          </div>
        </GlassCard>
      )}

      {/* Logged meals grouped by meal slot */}
      {grouped.length > 0 ? grouped.map(slot => (
        <div key={slot.id} style={{ marginBottom:'16px' }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'8px' }}>
            <SectionHeader>{slot.label}</SectionHeader>
            <span style={{ fontFamily:'Inter', fontSize:'11px', color:'rgba(224,68,134,0.6)' }}>
              {slot.items.reduce((a,m)=>a+m.kcal,0)} kcal

          </div>
          <div style={{ display:'flex', flexDirection:'column', gap:'6px' }}>
            {slot.items.map(m => (
              <div key={m._id} style={{ display:'flex', alignItems:'center', gap:'10px', padding:'10px 14px', borderRadius:'14px', background:'rgba(255,255,255,0.5)', backdropFilter:'blur(8px)' }}>
                <div style={{ width:'36px', height:'36px', borderRadius:'10px', background:'rgba(224,68,134,0.08)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}><Ic name="utensils" size={18} color="#E04486" stroke={1.7} /></div>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontFamily:'Inter', fontSize:'13px', fontWeight:500, color:'#1A0D14', textTransform:'capitalize', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{m.name}</div>
                  <div style={{ fontFamily:'Inter', fontSize:'10px', color:'rgba(224,68,134,0.65)', marginTop:'1px' }}>{m.time} · {m.protein}g prot</div>
                </div>
                <div style={{ textAlign:'right', flexShrink:0 }}>
                  <div style={{ fontFamily:'Playfair Display', fontSize:'16px', color:'#1A0D14' }}>{m.kcal}</div>
                  <div style={{ fontFamily:'Inter', fontSize:'9px', color:'rgba(224,68,134,0.5)' }}>kcal</div>
                </div>
                <button onClick={() => onRemove(m._id)} aria-label="Remove item" style={{ width:'28px', height:'28px', borderRadius:'50%', background:'rgba(224,68,134,0.2)', border:'none', fontSize:'12px', color:'#B72B6D', cursor:'pointer', flexShrink:0 }}>×</button>
              </div>
            ))}
          </div>
        </div>
      )) : (
        <GlassCard style={{ textAlign:'center', padding:'24px' }}>
          <div style={{ display:'flex', justifyContent:'center', marginBottom:'10px' }}><Ic name="utensils" size={30} color="rgba(224,68,134,0.5)" stroke={1.6} /></div>
          <div style={{ fontFamily:'Playfair Display', fontSize:'15px', color:'rgba(224,68,134,0.7)', fontStyle:'italic' }}>"What have you eaten today? Tell me and I'll track it for you."</div>
          <div style={{ fontFamily:'Inter', fontSize:'11px', color:'rgba(224,68,134,0.45)', marginTop:'6px' }}>— SEZE</div>
        </GlassCard>
      )}
    </div>
  );
}

              <GlassCard key={m.l} style={{ textAlign:'center', padding:'10px 6px' }}>

            </div>
          </GlassCard>

          {/* Ingredients */}
          <SectionHeader>Ingredients</SectionHeader>
          <GlassCard style={{ marginBottom:'16px' }}>
            {meal.ingredients.map((ing, i) => (
              <div key={i} style={{ display:'flex', alignItems:'center', gap:'10px', padding:'8px 0', borderBottom: i < meal.ingredients.length-1 ? '0.5px solid rgba(224,68,134,0.2)' : 'none' }}>

              </div>

          {/* Method */}
          <SectionHeader>Method</SectionHeader>

          </GlassCard>

          <PillButton onClick={onLog} disabled={logged} style={{ width:'100%', padding:'14px' }} variant={logged ? 'secondary' : 'primary'}>
            {logged ? '✓ Logged to today' : 'Log this meal'}
          </PillButton>
        </div>
      </div>
    </AppBackground>
  );
}

// ─── FEEDBACK BUTTON ──────────────────────────────────────────────────────────
function FeedbackButton({ screen }) {
  const [open, setOpen]     = useState(false);
  const [rating, setRating] = useState(0);
  const [hover, setHover]   = useState(0);
  const [msg, setMsg]       = useState('');
  const [email, setEmail]   = useState('');
  const [sent, setSent]     = useState(false);
  const [sending, setSending] = useState(false);
  const [errMsg, setErrMsg] = useState('');

  const submit = async () => {
    if (!rating) return;
    setSending(true); setErrMsg('');
    try {
      const { data: { session } } = await supabase.auth.getSession();
      // Anonymous testers submit with user_id null (RLS forbids impersonation)
      const { error } = await supabase.from('rosa_feedback').insert({
        user_id:  session?.user?.id || null,
        screen,
        rating,
        message:  msg.trim() || null,
        email:    email.trim() || session?.user?.email || null,
        platform: /iPhone|iPad|iPod/.test(navigator.userAgent) ? 'ios' :
                  /Android/.test(navigator.userAgent) ? 'android' : 'web',
        app_version: '1.0.0-beta',
      });
      if (error) throw error;
      setSent(true);
      setTimeout(() => { setOpen(false); setSent(false); setRating(0); setMsg(''); setEmail(''); }, 2200);
    } catch (e) {
      setErrMsg((e && e.message) ? e.message : 'Could not send — please try again.');
    } finally {
      setSending(false);
    }
  };

  const stars = [1,2,3,4,5];

  return (
    <>
      {open && (
        <div style={{ position:'fixed', inset:0, background:'rgba(26,13,20,0.35)', backdropFilter:'blur(4px)', zIndex:9998, display:'flex', alignItems:'flex-end', justifyContent:'center' }}
          onClick={e => { if (e.target === e.currentTarget) setOpen(false); }}>
          <div style={{ width:'100%', maxWidth:'430px', background:'linear-gradient(160deg,#FFFFFF,#FFF5F8)', borderRadius:'28px 28px 0 0', padding:'28px 24px 48px', boxShadow:'0 -8px 48px rgba(26,13,20,0.18)' }}>
            {sent ? (
              <div style={{ textAlign:'center', padding:'24px 0' }}>
                <div style={{ width:'72px', height:'72px', borderRadius:'50%', background:'#E04486', display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 14px', boxShadow:'0 6px 18px rgba(224,68,134,0.35)' }}><Ic name="heart" size={34} color="#FFFFFF" fill="#FFFFFF" stroke={1} /></div>
                <div style={{ fontFamily:'Playfair Display', fontSize:'22px', color:'#1A0D14' }}>Thank you!</div>
                <div style={{ fontFamily:'Inter', fontSize:'13px', color:'rgba(224,68,134,0.7)', marginTop:'6px' }}>Your feedback helps shape SEZE.</div>
              </div>
            ) : (
              <>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'20px' }}>
                  <div>
                    <div style={{ fontFamily:'Playfair Display', fontSize:'22px', color:'#1A0D14' }}>Share feedback</div>
                    <div style={{ fontFamily:'Inter', fontSize:'12px', color:'rgba(224,68,134,0.6)', marginTop:'2px' }}>Help us make SEZE better for you</div>
                  </div>
                  <button onClick={() => setOpen(false)} aria-label="Close" style={{ width:'32px', height:'32px', borderRadius:'50%', background:'rgba(224,68,134,0.3)', border:'none', fontSize:'16px', color:'#B72B6D', cursor:'pointer' }}>×</button>
                </div>

                {/* Star / emoji rating */}
                <div style={{ marginBottom:'20px' }}>
                  <div style={{ fontFamily:'Inter', fontSize:'12px', fontWeight:500, color:'rgba(224,68,134,0.7)', marginBottom:'10px', textTransform:'uppercase', letterSpacing:'0.08em' }}>How's SEZE working for you?</div>
                  <div style={{ display:'flex', justifyContent:'space-between' }}>
                    {stars.map((s, i) => (
                      <button key={i} onClick={() => setRating(i+1)}
                        onMouseEnter={() => setHover(i+1)} onMouseLeave={() => setHover(0)}
                        style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:'4px', background:'none', border:'none', cursor:'pointer', padding:'6px 8px', borderRadius:'12px', background: (hover||rating) > i ? 'rgba(224,68,134,0.25)' : 'transparent', transition:'all 0.15s' }}>
                        <Ic name="star" size={26} color={(hover||rating) > i ? '#E04486' : 'rgba(224,68,134,0.35)'} fill={(hover||rating) > i ? '#E04486' : 'none'} stroke={1.6} />
                        <span style={{ fontFamily:'Inter', fontSize:'9px', color:'rgba(224,68,134,0.6)' }}>{['Poor','Okay','Good','Great','Love it'][i]}</span>
                      </button>
                    ))}
                  </div>
                </div>

                {/* Text */}
                <div style={{ marginBottom:'20px' }}>
                  <div style={{ fontFamily:'Inter', fontSize:'12px', fontWeight:500, color:'rgba(224,68,134,0.7)', marginBottom:'8px', textTransform:'uppercase', letterSpacing:'0.08em' }}>Tell us more (optional)</div>
                  <textarea value={msg} onChange={e => setMsg(e.target.value)}
                    placeholder="What's working well? What could be better?"
                    style={{ width:'100%', minHeight:'80px', padding:'12px 14px', borderRadius:'14px', border:'0.5px solid rgba(224,68,134,0.4)', background:'rgba(255,255,255,0.6)', fontFamily:'Inter', fontSize:'13px', color:'#1A0D14', resize:'none', outline:'none', boxSizing:'border-box', lineHeight:1.5 }} />
                </div>

                {/* Optional contact so we can follow up */}
                <div style={{ marginBottom:'16px' }}>
                  <div style={{ fontFamily:'Inter', fontSize:'12px', fontWeight:500, color:'rgba(224,68,134,0.7)', marginBottom:'8px', textTransform:'uppercase', letterSpacing:'0.08em' }}>Email (optional — if you'd like a reply)</div>
                  <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="you@example.com"
                    style={{ width:'100%', padding:'12px 14px', borderRadius:'14px', border:'0.5px solid rgba(224,68,134,0.4)', background:'rgba(255,255,255,0.6)', fontFamily:'Inter', color:'#1A0D14', outline:'none', boxSizing:'border-box' }} />
                </div>

                {errMsg && (
                  <div style={{ marginBottom:'12px', padding:'10px 12px', borderRadius:'12px', background:'rgba(192,57,43,0.08)', border:'1px solid rgba(192,57,43,0.25)', fontFamily:'Inter', fontSize:'12px', color:'#c0392b' }}>
                    {errMsg}
                  </div>
                )}

                <button onClick={submit} disabled={!rating || sending}
                  style={{ width:'100%', padding:'15px', borderRadius:'24px', background: rating ? 'linear-gradient(135deg,#E04486,#B72B6D)' : 'rgba(224,68,134,0.3)', color: rating ? '#FFFFFF' : 'rgba(224,68,134,0.4)', border:'none', fontFamily:'Inter', fontSize:'14px', fontWeight:500, cursor: rating ? 'pointer' : 'default', transition:'all 0.2s' }}>
                  {sending ? 'Sending…' : 'Send feedback'}
                </button>
              </>
            )}
          </div>
        </div>
      )}
      <button onClick={() => setOpen(true)}
        style={{ position:'fixed', bottom:'148px', right:'16px', zIndex:9997, fontFamily:'Inter', fontSize:'11px', fontWeight:600, background:'rgba(242,111,166,0.9)', color:'#1A0D14', border:'none', borderRadius:'20px', padding:'7px 14px', cursor:'pointer', backdropFilter:'blur(8px)', boxShadow:'0 4px 16px rgba(0,0,0,0.12)', letterSpacing:'0.04em', display:'flex', alignItems:'center', gap:'6px' }}>
        <Ic name="send" size={13} color="#1A0D14" stroke={1.7} /> Feedback
      </button>
    </>
  );
}

// ─── FEEDBACK REVIEW (admin) ──────────────────────────────────────────────────
// Admins (rosa_admins allowlist) see every submission; everyone else sees only their own.
function FeedbackReviewScreen({ navigate }) {
  const [rows, setRows] = useState(null);
  const [isAdmin, setIsAdmin] = useState(null);
  const [filter, setFilter] = useState('all');
  const [busy, setBusy] = useState(null);

  const load = useCallback(async () => {
    try { const { data: adm } = await supabase.rpc('is_seze_admin'); setIsAdmin(!!adm); }
    catch (_) { setIsAdmin(false); }
    const { data, error } = await supabase.from('rosa_feedback')
      .select('id,created_at,screen,rating,message,email,status,platform,user_id')
      .order('created_at', { ascending: false }).limit(200);
    if (error) console.error('[feedback load]', error.message);
    setRows(error ? [] : (data || []));
  }, []);
  useEffect(() => { load(); }, [load]);

  const setStatus = async (id, status) => {
    setBusy(id);
    const { error } = await supabase.from('rosa_feedback').update({ status }).eq('id', id);
    if (error) console.error('[feedback status]', error.message);
    setBusy(null); load();
  };

  const all = rows || [];
  const shown = all.filter(r => filter === 'all' || (r.status || 'new') === filter);
  const counts = all.reduce((a, r) => { const s = r.status || 'new'; a[s] = (a[s] || 0) + 1; return a; }, {});
  const avg = all.length ? (all.reduce((a, r) => a + (r.rating || 0), 0) / all.length).toFixed(1) : '—';

  return (
    <AppBackground>
      <Screen scrollable>
        <div style={{ paddingTop:'56px', paddingBottom:'48px' }}>
          <div style={{ display:'flex', alignItems:'center', gap:'12px', marginBottom:'4px' }}>
            <button onClick={() => navigate('home')} aria-label="Back" style={{ background:'none', border:'none', cursor:'pointer', padding:0, display:'flex' }}><BackIcon /></button>
            <div style={{ fontFamily:'Playfair Display', fontSize:'30px', fontWeight:700, color:'#1A0D14' }}>Feedback</div>
          </div>
          <div style={{ fontFamily:'Inter', fontSize:'13px', color:'rgba(26,13,20,0.55)', marginBottom:'18px' }}>
            {isAdmin === false ? 'Showing your own submissions. Sign in as an admin to review everyone’s.' : 'All submissions, newest first.'}
          </div>

          <div style={{ display:'flex', gap:'8px', marginBottom:'16px' }}>
            {[{l:'Total',v:all.length},{l:'Avg rating',v:avg},{l:'New',v:counts.new||0}].map(s => (
              <GlassCard key={s.l} strong style={{ flex:1, textAlign:'center', padding:'12px 8px' }}>
                <div style={{ fontFamily:'Playfair Display', fontSize:'22px', color:'#1A0D14' }}>{s.v}</div>
                <div style={{ fontFamily:'Inter', fontSize:'9px', textTransform:'uppercase', letterSpacing:'0.07em', color:'rgba(224,68,134,0.6)', marginTop:'2px' }}>{s.l}</div>
              </GlassCard>
            ))}
          </div>

          <div style={{ display:'flex', gap:'6px', marginBottom:'14px', overflowX:'auto', paddingBottom:'4px' }}>
            {['all','new','reviewed','actioned','wontfix'].map(f => (
              <button key={f} onClick={() => setFilter(f)}
                style={{ padding:'7px 14px', borderRadius:'24px', whiteSpace:'nowrap', fontFamily:'Inter', fontSize:'11px', fontWeight:500, cursor:'pointer', flexShrink:0,
                  background: filter===f ? '#E04486' : 'rgba(255,255,255,0.5)', color: filter===f ? '#FFFFFF' : '#1A0D14',
                  border: filter===f ? 'none' : '0.5px solid rgba(224,68,134,0.3)' }}>{f}</button>
            ))}
          </div>

          {rows === null && <div style={{ fontFamily:'Inter', fontSize:'13px', color:'rgba(26,13,20,0.5)' }}>Loading…</div>}
          {rows && shown.length === 0 && (
            <GlassCard style={{ textAlign:'center', padding:'28px 20px' }}>
              <div style={{ fontFamily:'Playfair Display', fontSize:'15px', color:'#B72B6D', fontStyle:'italic' }}>No feedback here yet.</div>
              <div style={{ fontFamily:'Inter', fontSize:'11px', color:'rgba(26,13,20,0.5)', marginTop:'6px' }}>Submissions appear here as soon as they come in.</div>
            </GlassCard>
          )}

          {shown.map(r => (
            <GlassCard key={r.id} style={{ marginBottom:'10px' }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:'10px', marginBottom:'7px' }}>
                <div style={{ display:'flex', gap:'2px' }}>
                  {[1,2,3,4,5].map(i => <Ic key={i} name="star" size={14} color={i<=(r.rating||0)?'#E04486':'rgba(224,68,134,0.25)'} fill={i<=(r.rating||0)?'#E04486':'none'} stroke={1.6} />)}
                </div>
                <span style={{ fontFamily:'Inter', fontSize:'10px', color:'rgba(26,13,20,0.45)', textAlign:'right' }}>
                  {new Date(r.created_at).toLocaleDateString()} · {r.screen || '—'}
                </span>
              </div>
              {r.message && <div style={{ fontFamily:'Inter', fontSize:'13px', color:'#1A0D14', lineHeight:1.55, marginBottom:'7px' }}>{r.message}</div>}
              <div style={{ fontFamily:'Inter', fontSize:'11px', color:'rgba(26,13,20,0.5)', marginBottom:'10px' }}>
                {r.email || (r.user_id ? 'signed-in user' : 'anonymous')} · {r.platform || 'web'}
              </div>
              <div style={{ display:'flex', gap:'6px', flexWrap:'wrap' }}>
                {['new','reviewed','actioned','wontfix'].map(s => (
                  <button key={s} disabled={busy===r.id} onClick={() => setStatus(r.id, s)}
                    style={{ padding:'5px 11px', borderRadius:'20px', fontFamily:'Inter', fontSize:'10px', fontWeight:600, cursor:'pointer',
                      background:(r.status||'new')===s ? '#15B5A6' : 'rgba(255,255,255,0.6)',
                      color:(r.status||'new')===s ? '#FFFFFF' : 'rgba(26,13,20,0.6)',
                      border:(r.status||'new')===s ? 'none' : '0.5px solid rgba(224,68,134,0.25)', opacity: busy===r.id ? 0.5 : 1 }}>{s}</button>
                ))}
              </div>
            </GlassCard>
          ))}
        </div>
      </Screen>
    </AppBackground>
  );
}

// ─── DEV TEST MODE BUTTON ─────────────────────────────────────────────────────
const ALL_SCREENS = ['splash','terms','auth','onboarding','home','programmes','programme_detail','workout','nutrition','progress','profile','feedback_review'];

// Dev mode is always on for localhost. On production, open ?dev=1 to switch it on
// (it sticks via localStorage for demos) and ?dev=0 to switch it back off.
function devModeEnabled() {
  if (typeof window === 'undefined') return false;
  try {
    if (/localhost|127\.0\.0\.1/.test(window.location.hostname)) return true;
    const p = new URLSearchParams(window.location.search).get('dev');
    if (p === '1') window.localStorage.setItem('seze_dev', '1');
    if (p === '0') window.localStorage.removeItem('seze_dev');
    return window.localStorage.getItem('seze_dev') === '1';
  } catch (_) { return false; }
}

function DevTestButton({ screen, navigate }) {
  const [open, setOpen] = useState(false);
  const [touring, setTouring] = useState(false);
  const tourRef = useRef(null);

  const startTour = () => {
    setOpen(false);
    setTouring(true);
    const stops = ['splash','terms','onboarding','home','programmes','workout','nutrition','progress','profile'];
    let i = 0;
    const tick = () => {
      if (i >= stops.length) { setTouring(false); return; }
      navigate(stops[i++]);
      tourRef.current = setTimeout(tick, 2500);
    };
    tick();
  };

  useEffect(() => () => clearTimeout(tourRef.current), []);

  return (
    <div style={{ position:'fixed', bottom:'90px', right:'16px', zIndex:9999, display:'flex', flexDirection:'column', alignItems:'flex-end', gap:'8px' }}>
      {open && (
        <div style={{ background:'rgba(26,13,20,0.92)', backdropFilter:'blur(12px)', borderRadius:'14px', padding:'10px 0', minWidth:'170px', boxShadow:'0 8px 32px rgba(0,0,0,0.3)' }}>
          <div style={{ fontFamily:'Inter', fontSize:'10px', fontWeight:600, textTransform:'uppercase', letterSpacing:'0.12em', color:'rgba(224,68,134,0.5)', padding:'0 14px 8px' }}>Jump to screen</div>
          {ALL_SCREENS.map(s => (
            <button key={s} onClick={() => { navigate(s); setOpen(false); }}
              style={{ display:'block', width:'100%', textAlign:'left', fontFamily:'Inter', fontSize:'12px', color: s === screen ? '#15B5A6' : 'rgba(255,255,255,0.75)', background: s === screen ? 'rgba(224,68,134,0.15)' : 'none', border:'none', padding:'7px 14px', cursor:'pointer', fontWeight: s === screen ? 600 : 400 }}>
              {s === screen ? '▶ ' : ''}{s}
            </button>
          ))}
          <div style={{ height:'0.5px', background:'rgba(224,68,134,0.2)', margin:'8px 0' }} />
          <button onClick={startTour}
            style={{ display:'block', width:'100%', textAlign:'left', fontFamily:'Inter', fontSize:'12px', color:'#E8C8D8', background:'none', border:'none', padding:'7px 14px', cursor:'pointer', fontWeight:500 }}>
            Auto-tour (2.5s each)
          </button>
        </div>
      )}
      <button onClick={() => setOpen(o => !o)}
        style={{ fontFamily:'Inter', fontSize:'11px', fontWeight:600, background: touring ? 'rgba(232,100,100,0.9)' : 'rgba(26,13,20,0.85)', color:'white', border:'none', borderRadius:'20px', padding:'7px 14px', cursor:'pointer', backdropFilter:'blur(8px)', boxShadow:'0 4px 16px rgba(0,0,0,0.25)', letterSpacing:'0.04em' }}>
        {touring ? 'Stop tour' : 'Dev'}
      </button>
    </div>
  );
}

// ─── ROOT APP ─────────────────────────────────────────────────────────────────
async function getProfileRoute(session) {
  try {
    const { data } = await supabase.from('rosa_users').select('onboarding_complete').eq('id', session.user.id).maybeSingle();
    return data?.onboarding_complete ? 'home' : 'onboarding';
  } catch (_) {
    return 'home';
  }
}

// Real user data provider — replaces the hardcoded USER mock once a session exists.
const AppDataCtx = React.createContext(null);
const useAppData = () => React.useContext(AppDataCtx);

function computeStreak(isoDates) {
  const days = new Set((isoDates || []).map(d => new Date(d).toISOString().split('T')[0]));
  if (days.size === 0) return 0;
  let streak = 0;
  const cur = new Date();
  // allow the streak to count from today or yesterday
  if (!days.has(cur.toISOString().split('T')[0])) cur.setDate(cur.getDate() - 1);
  for (;;) {
    if (days.has(cur.toISOString().split('T')[0])) { streak++; cur.setDate(cur.getDate() - 1); }
    else break;
  }
  return streak;
}

async function loadUserData() {
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) return null;
  const uid = session.user.id;
  const today = new Date().toISOString().split('T')[0];
  const [pRes, mRes, sRes] = await Promise.all([
    supabase.from('rosa_users').select('*').eq('id', uid).maybeSingle(),
    supabase.from('rosa_nutrition_logs').select('kcal,protein,carbs,fat,meal_name,meal_type,portions,logged_at').eq('user_id', uid).eq('logged_date', today).order('logged_at', { ascending: true }),
    supabase.from('rosa_sessions').select('completed_at').eq('user_id', uid).order('completed_at', { ascending: false }).limit(90),
  ]);
  const meals = mRes.data || [];
  const totals = meals.reduce((a, m) => ({
    kcal: a.kcal + (m.kcal || 0), protein: a.protein + Number(m.protein || 0),
    carbs: a.carbs + Number(m.carbs || 0), fat: a.fat + Number(m.fat || 0),
  }), { kcal: 0, protein: 0, carbs: 0, fat: 0 });
  const sessions = sRes.data || [];
  return {
    profile: pRes.data || null,
    email: session.user.email,
    firstName: (pRes.data?.full_name || session.user.email || 'there').split(' ')[0].split('@')[0],
    meals, todayTotals: totals,
    sessionCount: sessions.length,
    streak: computeStreak(sessions.map(s => s.completed_at)),
  };
}

function App() {
  const [screen, setScreen] = useState('splash');
  const [params, setParams] = useState({});
  const [consentData, setConsentData] = useState(null);
  const [authChecked, setAuthChecked] = useState(false);
  const [data, setData] = useState(null);
  const screenRef = useRef('splash');
  screenRef.current = screen;
  const refresh = useCallback(() => { loadUserData().then(d => { if (d) setData(d); }).catch(() => {}); }, []);
  const signOut = useCallback(async () => { try { await supabase.auth.signOut(); } catch (_) {} setData(null); setScreen('splash'); }, []);

  useEffect(() => {
    let done = false;
    const finish = (dest) => {
      if (done) return;
      done = true;
      if (dest) setScreen(dest);
      setAuthChecked(true);
    };

    // Hard 3s timeout — never leave user stuck on loading screen
    const timeout = setTimeout(() => finish(null), 3000);

    supabase.auth.getSession()
      .then(async ({ data: { session } }) => {
        if (session) {
          loadUserData().then(d => { if (d) setData(d); }).catch(() => {});
          const dest = await getProfileRoute(session);
          finish(dest);
        } else {
          finish(null); // no session → splash
        }
      })
      .catch(() => finish(null))
      .finally(() => clearTimeout(timeout));

    let subscription;
    try {
      const { data } = supabase.auth.onAuthStateChange(async (_event, session) => {
        if (session && (screenRef.current === 'auth' || screenRef.current === 'splash')) {
          loadUserData().then(d => { if (d) setData(d); }).catch(() => {});
          try {
            const dest = await getProfileRoute(session);
            setScreen(dest);
          } catch (_) {
            setScreen('home');
          }
        }
      });
      subscription = data.subscription;
    } catch (_) {}

    return () => {
      clearTimeout(timeout);
      try { subscription && subscription.unsubscribe(); } catch (_) {}
    };
  }, []);

  const navigate = (dest, p = {}) => {
    setParams(p);
    setScreen(dest);
    window.scrollTo(0, 0);
    if (['home', 'nutrition', 'progress', 'profile'].includes(dest)) refresh();
  };

  const handleTermsAccept = (consent) => {
    setConsentData(consent);
    navigate('auth', { mode: 'signup' });
  };

  if (!authChecked) {
    return (
      <div style={{ minHeight:'100vh', background:'linear-gradient(160deg,#E04486 0%,#B72B6D 100%)', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:'16px' }}>
        <div style={{ animation:'pulse 1.5s ease-in-out infinite' }}>
          <SezeLogoMark size={64} color="#FFFFFF" />
        </div>
        <div style={{ fontFamily:"'Poppins','Inter',sans-serif", fontSize:'38px', color:'#FFFFFF', letterSpacing:'0.005em', fontWeight:700, animation:'pulse 1.5s ease-in-out infinite' }}>seze</div>
        <div style={{ fontFamily:'Inter, sans-serif', fontSize:'10px', color:'rgba(255,255,255,0.5)', letterSpacing:'0.2em', textTransform:'uppercase' }}>loading…</div>
      </div>
    );
  }

  const screenEl = (() => {
    switch (screen) {
      case 'splash':         return <SplashScreen navigate={navigate} />;
      case 'terms':          return <TermsScreen onAccept={handleTermsAccept} />;
      case 'auth':           return <AuthScreen navigate={navigate} consentData={consentData} params={params} />;
      case 'onboarding':     return <OnboardingScreen navigate={navigate} />;
      case 'home':           return <HomeScreen navigate={navigate} />;
      case 'programmes':     return <ProgrammesScreen navigate={navigate} />;
      case 'programme_detail': return <ProgrammeDetailScreen navigate={navigate} params={params} />;
      case 'workout':        return <WorkoutPlayerScreen navigate={navigate} />;
      case 'nutrition':      return <NutritionScreen navigate={navigate} />;
      case 'progress':       return <ProgressScreen navigate={navigate} />;
      case 'profile':        return <ProfileScreen navigate={navigate} />;
      case 'feedback_review': return <FeedbackReviewScreen navigate={navigate} />;
      default:               return <SplashScreen navigate={navigate} />;
    }
  })();

  // Dev mode: always on localhost; on production enable with ?dev=1 (sticky) and disable with ?dev=0
  const isDev = devModeEnabled();
  // Feedback is available everywhere except the immersive player (it would cover the controls)
  const hideFeedback = screen === 'workout' || screen === 'feedback_review';
  return (
    <AppDataCtx.Provider value={{ ...(data || {}), refresh, signOut }}>
      {screenEl}
      {!hideFeedback && <FeedbackButton screen={screen} />}
      {isDev && <DevTestButton screen={screen} navigate={navigate} />}
    </AppDataCtx.Provider>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

</script>
</body>
</html>
