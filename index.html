    :root {
      --rosa-violet:    #C8B8E8;
      --rosa-lavender:  #DDD5F5;
      --rosa-mist:      #F2EEFB;
      --rosa-apricot:   #FDEEE0;
      --rosa-powder:    #F8D0E4;
      --rosa-petal:     #FAEAF2;
      --rosa-amethyst:  #9878B8;
      --rosa-text:      #3A1848;
      --rosa-text-mid:  rgba(152,120,184,0.7);
      --rosa-text-soft: rgba(152,120,184,0.45);
      --rosa-grad:      linear-gradient(150deg,#F2EEFB 0%,#FDEEE0 45%,#F8D0E4 100%);
      --rosa-font-d:    'Gilda Display', serif;
      --rosa-font-ui:   'Outfit', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: var(--rosa-font-ui);
      background: var(--rosa-grad);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }
    #root {
      width: 100%;
      max-width: 390px;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }
    @keyframes fadeUp   { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    @keyframes scaleIn  { from{opacity:0;transform:scale(0.96)} to{opacity:1;transform:scale(1)} }
    @keyframes slideL   { from{opacity:0;transform:translateX(28px)} to{opacity:1;transform:translateX(0)} }
    @keyframes pulse    { 0%,100%{opacity:1} 50%{opacity:0.55} }
    @keyframes spin     { to{transform:rotate(360deg)} }
    @keyframes badgePop { 0%{transform:scale(0)} 60%{transform:scale(1.25)} 80%{transform:scale(0.9)} 100%{transform:scale(1)} }
    @keyframes glow     { 0%{box-shadow:0 0 0 0 rgba(152,120,184,0.5)} 70%{box-shadow:0 0 0 18px rgba(152,120,184,0)} 100%{box-shadow:0 0 0 0 rgba(152,120,184,0)} }
    @keyframes countUp  { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    @keyframes timerTick{ 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }
    .fadeUp   { animation: fadeUp 0.28s ease-out both; }
    .scaleIn  { animation: scaleIn 0.22s ease-out both; }
    .slideL   { animation: slideL 0.22s ease-out both; }
    ::-webkit-scrollbar { width: 0; }
    input, button, select { font-family: var(--rosa-font-ui); }
    button { cursor: pointer; border: none; background: none; }
    input:focus { outline: none; }
  </style>
</head>

// ─── NATURAL LANGUAGE FOOD PARSER ────────────────────────────────────────────
function parseFood(text) {
  const WORD_QTY = {a:1,an:1,one:1,two:2,three:3,four:4,five:5,six:6,half:0.5,quarter:0.25,double:2,couple:2,large:1.4,big:1.4,small:0.65,medium:1,tiny:0.4,handful:0.5,few:3};
  const FILLERS = ['of','the','some','bit','piece','slice','slices','cup','cups','bowl','bowls','glass','glasses','serving','portion','scoop','tablespoon','tbsp','teaspoon','tsp','ml','grams','g','with','on'];

  const chunks = text.toLowerCase().trim().split(/\s*(?:\band\b|,|\+|\bthen\b|\bplus\b)\s*/);
  const results = [];

  for (let chunk of chunks) {
    chunk = chunk.trim();
    if (!chunk || chunk.length < 2) continue;
    let qty = 1, food = chunk;

    // Leading integer or decimal
    const nm = food.match(/^(\d+\.?\d*)\s*/);
    if (nm) { qty = parseFloat(nm[1]); food = food.slice(nm[0].length).trim(); }

    // Leading word quantity
    for (const [word, val] of Object.entries(WORD_QTY)) {
      if (new RegExp(`^${word}\\b\\s*`,'i').test(food)) {
        qty *= val;
        food = food.replace(new RegExp(`^${word}\\b\\s*`,'i'),'').trim();
        break;
      }
    }

    // Strip filler words from the front
    let changed = true;
    while (changed) {
      changed = false;
      for (const f of FILLERS) {
        if (new RegExp(`^${f}\\s+`,'i').test(food)) {
          food = food.replace(new RegExp(`^${f}\\s+`,'i'),'').trim();
          changed = true;
        }
      }
    }
    if (!food) continue;

    // Match against FOOD_DB
    let best = null, bestScore = 0;
    for (const item of FOOD_DB) {
      for (const c of [item.n, ...item.a]) {
        let score = 0;
        if (food === c) score = 100;
        else if (food.startsWith(c) || c.startsWith(food)) score = 88;
        else if (food.includes(c) || c.includes(food)) score = 75 * Math.min(food.length,c.length)/Math.max(food.length,c.length);
        else {
          const fw = new Set(food.split(' ').filter(w=>w.length>2));
          const cw = c.split(' ').filter(w=>w.length>2);
          const overlap = cw.filter(w=>fw.has(w)).length;
          if (overlap) score = 55 * overlap / Math.max(fw.size,cw.length);
        }
        if (score > bestScore) { bestScore = score; best = item; }
      }
      if (bestScore===100) break;
    }

    if (best && bestScore >= 30) {
      const f = (best.g * qty) / 100;
      results.push({ id: Date.now()+Math.random(), name:best.n, displayQty:qty, kcal:Math.round(best.k*f), protein:Math.round(best.p*f*10)/10, carbs:Math.round(best.c*f*10)/10, fat:Math.round(best.f*f*10)/10, emoji:best.e, _item:best, qty });
    } else if (food.length > 2) {
      results.push({ id: Date.now()+Math.random(), name:food, displayQty:qty, kcal:Math.round(150*qty), protein:Math.round(8*qty*10)/10, carbs:Math.round(15*qty*10)/10, fat:Math.round(6*qty*10)/10, emoji:'🍽️', _item:null, qty, estimated:true });
    }
  }
  return results;
}

// ─── BRAIN MATRIX ────────────────────────────────────────────────────────────
function computeMatrix(answers) {
  const { lifeStage, goals = [], daysPerWeek, equipment, dietType } = answers;

  let primary = 'new_mum';
  let secondary = null;
  let reason = '';

  if (lifeStage === 'pregnant') {
    primary = 'pregnant';
    reason = "Because you're currently pregnant, Rosa has matched you with a trimester-adjusted programme that keeps you and your baby safe while maintaining your fitness and strength throughout each phase.";
  } else if (lifeStage === 'new_baby') {
    primary = 'new_mum';
    secondary = 'core';
    reason = "You're in your first six months post-birth — the most important window for recovery. Rosa's New Mum Reset is built specifically for this stage, with pelvic floor-first sequencing and safe progressive loading.";
  } else if (goals.includes('lose_fat') && goals.includes('build_muscle')) {
    primary = 'composition';
    reason = "You want to both lose fat and build muscle — that's body recomposition. Rosa's 12-week programme combines strength training with strategic cardio and nutrition-aligned macros to transform your composition simultaneously.";
  } else if (goals.includes('build_muscle') || goals.includes('gain_weight')) {
    primary = 'gain';
    reason = "Your goal is building visible muscle and strength. Rosa designed this programme to take on the cultural myth that lifting makes women 'bulky' — and to give you the lean, strong physique that comes from progressive overload.";
  } else if (goals.includes('lose_fat')) {
    primary = 'reset';
    reason = "Your goal is sustainable fat loss — not a crash diet. Rosa's Weight Reset is cycle-aware, preserves your muscle throughout, and builds habits that last long beyond the programme.";
  } else if (goals.includes('booty')) {
    primary = 'booty';
    reason = "You're focused on building your glutes and lower body strength. Rosa's Booty Building programme uses progressive overload across 8 weeks with pelvic floor integration in every session.";
  } else if (goals.includes('core') || goals.includes('pelvic_floor')) {
    primary = 'core';
    reason = "Core strength and pelvic floor health are your foundation — and Rosa's 6-week programme addresses both together. Whether you're post-natal or not, this transforms how you move in every other exercise.";
  } else {
    primary = 'composition';
    reason = "Based on your profile, Rosa recommends her all-over Body Composition programme — 12 weeks of strength and cardio hybrid training designed to reshape and strengthen your entire body.";
  }

  if (!secondary && primary !== 'core' && (lifeStage === 'post_baby_6_24' || lifeStage === 'post_baby_2plus')) {
    secondary = 'core';
  }

  // Macro calc: simple TDEE estimate
  const height = answers.height || 165;
  const weight = answers.weight || 65;
  const bmr = 10 * weight + 6.25 * height - 5 * 25 - 161;
  const activityFactor = daysPerWeek >= 5 ? 1.55 : daysPerWeek >= 3 ? 1.375 : 1.2;
  const tdee = Math.round(bmr * activityFactor);
  const deficit = goals.includes('lose_fat') ? -300 : goals.includes('build_muscle') ? 200 : 0;
  const kcal = tdee + deficit;
  const protein = Math.round(weight * 2.0);
  const fat = Math.round((kcal * 0.28) / 9);
  const carbs = Math.round((kcal - protein * 4 - fat * 9) / 4);

  const prog = PROGRAMMES.find(p => p.id === primary);
  const sec  = secondary ? PROGRAMMES.find(p => p.id === secondary) : null;

  return { primary: prog, secondary: sec, reason, kcal, protein, carbs, fat };
}

// ── ProgressRing ──────────────────────────────────────────────────────────────
function ProgressRing({ completed, total, size=96 }) {
  const r = (size / 2) - 10;
  const circ = 2 * Math.PI * r;
  const pct = total > 0 ? completed / total : 0;
  const [animated, setAnimated] = useState(0);

  useEffect(() => {
    let frame;
    let start = null;
    const duration = 900;
    const animate = (ts) => {
      if (!start) start = ts;
      const elapsed = ts - start;
      const progress = Math.min(elapsed / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3);
      setAnimated(eased * pct);
      if (progress < 1) frame = requestAnimationFrame(animate);
    };
    frame = requestAnimationFrame(animate);
    return () => cancelAnimationFrame(frame);
  }, [pct]);

  const offset = circ - animated * circ;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ display:'block' }}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.5)" strokeWidth="9"/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#C8B8E8" strokeWidth="9"
        strokeDasharray={circ} strokeDashoffset={offset}
        strokeLinecap="round" transform={`rotate(-90 ${size/2} ${size/2})`}
        style={{ transition:'none' }}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#F8D0E4" strokeWidth="3"
        strokeDasharray={`${circ * 0.08} ${circ * 0.92}`} strokeLinecap="round"
        transform={`rotate(${-90 + animated * 360} ${size/2} ${size/2})`} opacity="0.9"/>
      <text x={size/2} y={size/2 - 5} textAnchor="middle" fill="#3A1848"
        fontSize="17" fontFamily="Gilda Display, serif">{completed}/{total}</text>
      <text x={size/2} y={size/2 + 12} textAnchor="middle" fill="rgba(152,120,184,0.65)"
        fontSize="9" fontFamily="Outfit, sans-serif">sessions</text>
    </svg>
  );
}

    <GlassCard amethyst style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'14px 18px', ...style }}>

// ── MiniBarChart ──────────────────────────────────────────────────────────────
function MiniBarChart({ data }) {
  const max = Math.max(...data.map(d => d.sessions), 1);
  const H = 100, W = 280, barW = 32, gap = (W - data.length * barW) / (data.length + 1);
  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H + 24}`} style={{ display:'block' }}>
      {data.map((d, i) => {
        const x = gap + i * (barW + gap);
        const barH = (d.sessions / max) * H;
        const y = H - barH;
        return (
          <g key={i}>
            <rect x={x} y={y} width={barW} height={barH} rx="6" fill="#C8B8E8" opacity="0.85"/>
            <text x={x + barW/2} y={H + 16} textAnchor="middle" fontFamily="Outfit" fontSize="9" fill="rgba(152,120,184,0.7)">{d.week}</text>
            <text x={x + barW/2} y={y - 4} textAnchor="middle" fontFamily="Outfit" fontSize="9" fill="#9878B8">{d.sessions}</text>
          </g>
        );
      })}
    </svg>
  );
}

// ── Login / Signup Screen ─────────────────────────────────────────────────────
function AuthScreen({ navigate, consentData }) {
  const [mode, setMode] = useState('login'); // 'login' | 'signup' | 'forgot'
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [name, setName] = useState('');
  const [loading, setLoading] = useState(null);
  const [error, setError] = useState('');
  const [showPassword, setShowPassword] = useState(false);

  const handleEmail = async () => {
    if (!email || (mode !== 'forgot' && !password)) { setError('Please fill in all fields.'); return; }
    setLoading('email');
    setError('');
    try {
      if (mode === 'signup') {
        const redirectTo = window.location.hostname === 'localhost' ? window.location.origin : 'https://rosa-app-ten.vercel.app';
        const { data, error: err } = await supabase.auth.signUp({ email, password, options: { emailRedirectTo: redirectTo, data: { full_name: name, marketing_consent: consentData?.marketing, gdpr_consent: true, gdpr_date: new Date().toISOString() } } });
        if (err) throw err;
        setMode('verify');
      } else if (mode === 'login') {
        const { data, error: err } = await supabase.auth.signInWithPassword({ email, password });
        if (err) throw err;
        const { data: profile } = await supabase.from('profiles').select('onboarding_complete').eq('id', data.user.id).single();
        navigate(profile?.onboarding_complete ? 'home' : 'onboarding');
      } else {
        const { error: err } = await supabase.auth.resetPasswordForEmail(email);
        if (err) throw err;
        setMode('forgot_sent');
      }
    } catch (e) {
      setError(e.message || 'Something went wrong. Please try again.');
    }
    setLoading(null);
  };

  const handleOAuth = async (provider) => {
    setLoading(provider);
    setError('');
    try {
      const { error: err } = await supabase.auth.signInWithOAuth({ provider, options: { redirectTo: window.location.origin } });
      if (err) throw err;
    } catch (e) {
      setError(e.message || 'OAuth sign-in failed.');
    }
    setLoading(null);
  };

  // Verify email sent state
  if (mode === 'verify') {
    return (
      <AppBackground>
        <div style={{ minHeight:'100vh', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'40px 28px', textAlign:'center' }}>
          <div style={{ fontSize:'56px', marginBottom:'20px' }}>📬</div>
          <div style={{ fontFamily:'Gilda Display', fontSize:'28px', color:'#3A1848', marginBottom:'8px' }}>Check your inbox.</div>
          <div style={{ fontFamily:'Outfit', fontSize:'14px', fontWeight:300, color:'rgba(152,120,184,0.7)', lineHeight:1.7, marginBottom:'32px' }}>
            We've sent a verification link to <strong style={{ color:'#3A1848' }}>{email}</strong>. Click it to activate your account, then come back here.
          </div>
          <PillButton onClick={() => navigate('home')} style={{ width:'100%', maxWidth:'280px', padding:'14px' }}>
            I've verified — continue →
          </PillButton>
          <button onClick={() => setMode('login')} style={{ fontFamily:'Outfit', fontSize:'12px', color:'rgba(152,120,184,0.6)', background:'none', border:'none', cursor:'pointer', marginTop:'16px' }}>
            Back to login
          </button>
        </div>
      </AppBackground>
    );
  }

  if (mode === 'forgot_sent') {
    return (
      <AppBackground>
        <div style={{ minHeight:'100vh', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'40px 28px', textAlign:'center' }}>
          <div style={{ fontSize:'56px', marginBottom:'20px' }}>🔑</div>
          <div style={{ fontFamily:'Gilda Display', fontSize:'28px', color:'#3A1848', marginBottom:'8px' }}>Reset link sent.</div>
          <div style={{ fontFamily:'Outfit', fontSize:'14px', fontWeight:300, color:'rgba(152,120,184,0.7)', lineHeight:1.7, marginBottom:'32px' }}>
            Check your email for a password reset link.
          </div>
          <PillButton onClick={() => setMode('login')} style={{ width:'100%', maxWidth:'280px', padding:'14px' }}>
            Back to login
          </PillButton>
        </div>
      </AppBackground>
    );
  }

  return (
    <AppBackground>
      <div style={{ minHeight:'100vh', display:'flex', flexDirection:'column', padding:'0 24px 32px' }}>
        {/* Header */}
        <div style={{ paddingTop:'64px', textAlign:'center', marginBottom:'32px' }}>
          <div style={{ fontFamily:'Gilda Display', fontSize:'48px', color:'#3A1848', letterSpacing:'0.06em', marginBottom:'8px' }}>ROSA</div>
          <div style={{ fontFamily:'Gilda Display', fontSize:'16px', color:'rgba(152,120,184,0.8)', fontStyle:'italic' }}>
            {mode === 'signup' ? 'Create your account.' : mode === 'forgot' ? 'Reset your password.' : 'Welcome back.'}
          </div>
        </div>

        {/* OAuth buttons */}
        {mode !== 'forgot' && (
          <div style={{ display:'flex', flexDirection:'column', gap:'10px', marginBottom:'20px' }}>
            <OAuthButton provider="google" label="Continue with Google" loading={loading==='google'} onClick={() => handleOAuth('google')} />
            <OAuthButton provider="apple"  label="Continue with Apple"  loading={loading==='apple'}  onClick={() => handleOAuth('apple')} />
            <OAuthButton provider="facebook" label="Continue with Meta" loading={loading==='facebook'} onClick={() => handleOAuth('facebook')} />
          </div>
        )}

        {/* Divider */}
        {mode !== 'forgot' && (
          <div style={{ display:'flex', alignItems:'center', gap:'12px', marginBottom:'20px' }}>
            <div style={{ flex:1, height:'0.5px', background:'rgba(200,184,232,0.4)' }} />
            <span style={{ fontFamily:'Outfit', fontSize:'11px', color:'rgba(152,120,184,0.55)' }}>or with email</span>
            <div style={{ flex:1, height:'0.5px', background:'rgba(200,184,232,0.4)' }} />
          </div>
        )}

        {/* Email form */}
        <div style={{ display:'flex', flexDirection:'column', gap:'10px', marginBottom:'16px' }}>
          {mode === 'signup' && (
            <AuthInput placeholder="Full name" value={name} onChange={setName} type="text" icon="👤" />
          )}
          <AuthInput placeholder="Email address" value={email} onChange={setEmail} type="email" icon="✉️" />
          {mode !== 'forgot' && (
            <AuthInput placeholder="Password" value={password} onChange={setPassword}
              type={showPassword ? 'text' : 'password'} icon="🔒"
              rightAction={{ label: showPassword ? 'Hide' : 'Show', onClick: () => setShowPassword(!showPassword) }} />
          )}
        </div>

        {error && (
          <div style={{ padding:'10px 14px', borderRadius:'10px', background:'rgba(248,100,100,0.12)', border:'0.5px solid rgba(248,100,100,0.3)', fontFamily:'Outfit', fontSize:'12px', color:'#c0392b', marginBottom:'12px' }}>
            {error}
          </div>
        )}

        {mode === 'login' && (
          <button onClick={() => { setMode('forgot'); setError(''); }}
            style={{ fontFamily:'Outfit', fontSize:'12px', color:'rgba(152,120,184,0.7)', background:'none', border:'none', cursor:'pointer', textAlign:'right', marginBottom:'12px' }}>
            Forgot password?
          </button>
        )}

        <PillButton onClick={handleEmail} style={{ width:'100%', padding:'15px', fontSize:'14px', marginBottom:'16px' }}>
          {loading === 'email' ? 'Please wait…' : mode === 'signup' ? 'Create account' : mode === 'forgot' ? 'Send reset link' : 'Sign in'}
        </PillButton>

        {/* Toggle login/signup */}
        {mode !== 'forgot' ? (
          <div style={{ textAlign:'center' }}>
            <span style={{ fontFamily:'Outfit', fontSize:'13px', color:'rgba(152,120,184,0.7)' }}>
              {mode === 'login' ? "Don't have an account? " : 'Already have an account? '}
            </span>
            <button onClick={() => { setMode(mode === 'login' ? 'signup' : 'login'); setError(''); }}
              style={{ fontFamily:'Outfit', fontSize:'13px', fontWeight:500, color:'#9878B8', background:'none', border:'none', cursor:'pointer' }}>
              {mode === 'login' ? 'Sign up' : 'Sign in'}
            </button>
          </div>
        ) : (
          <button onClick={() => { setMode('login'); setError(''); }}
            style={{ fontFamily:'Outfit', fontSize:'13px', color:'rgba(152,120,184,0.7)', background:'none', border:'none', cursor:'pointer', textAlign:'center', width:'100%' }}>
            ← Back to sign in
          </button>
        )}

        {/* Legal note */}
        <div style={{ marginTop:'auto', paddingTop:'24px', textAlign:'center' }}>
          <span style={{ fontFamily:'Outfit', fontSize:'10px', color:'rgba(152,120,184,0.45)', lineHeight:1.6 }}>

          </span>
        </div>
      </div>
    </AppBackground>
  );
}

// ─── ONBOARDING ───────────────────────────────────────────────────────────────
function OnboardingScreen({ navigate }) {
  const [step, setStep] = useState(1);
  const TOTAL = 7;
  const [answers, setAnswers] = useState({
    lifeStage: null,
    height: 165,
    weight: 65,
    imperial: false,
    bodyType: null,
    goals: [],
    daysPerWeek: 3,
    sessionLength: 45,
    equipment: 'gym',
    dietType: 'omnivore',
    allergies: [],
  });
  const [matrix, setMatrix] = useState(null);
  const [revealing, setRevealing] = useState(false);
  const [revealed, setRevealed] = useState(false);

  const update = (key, val) => setAnswers(a => ({ ...a, [key]: val }));

  const next = () => {
    if (step === 6) {
      setStep(7);
      setRevealing(true);
      setTimeout(() => {
        setMatrix(computeMatrix(answers));
        setRevealing(false);
        setRevealed(true);
      }, 2200);
    } else if (step < TOTAL) {
      setStep(s => s + 1);
    } else {
      // Mark onboarding complete in Supabase
      supabase.auth.getSession().then(({ data: { session } }) => {
        if (session) {
          supabase.from('profiles').update({
            onboarding_complete: true,
            life_stage: answers.lifeStage,
            goals: answers.goals,
            diet_type: answers.dietType,
            allergies: answers.allergies,
            height_cm: answers.imperial ? answers.height * 2.54 : answers.height,
            weight_kg: answers.imperial ? answers.weight * 0.453592 : answers.weight,
            body_type: answers.bodyType,
          }).eq('id', session.user.id);
        }
      });
      navigate('home');
    }
  };
  const back = () => step > 1 && setStep(s => s - 1);

  const canContinue = () => {
    if (step === 2) return !!answers.lifeStage;
    if (step === 4) return answers.goals.length > 0;
    return true;
  };

  return (
    <AppBackground>
      <div style={{ minHeight:'100vh', display:'flex', flexDirection:'column', padding:'0 20px 32px' }}>
        {/* Header */}
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', paddingTop:'56px', paddingBottom:'24px' }}>
          {step > 1
            ? <button onClick={back} style={{ background:'none', border:'none', cursor:'pointer', padding:'4px' }}><BackIcon /></button>
            : <div style={{ width:'28px' }} />}
          <div style={{ display:'flex', gap:'6px' }}>
            {Array.from({length:TOTAL}).map((_,i) => (
              <div key={i} style={{ width: i+1===step ? '20px' : '6px', height:'6px', borderRadius:'3px', background: i+1<=step ? '#9878B8' : 'rgba(152,120,184,0.25)', transition:'all 0.3s ease' }} />
            ))}
          </div>
          <div style={{ width:'28px' }} />
        </div>

        {/* Step content */}
        <div key={step} className="slideL" style={{ flex:1, display:'flex', flexDirection:'column' }}>
          {step === 1 && <Step1 />}
          {step === 2 && <Step2 answers={answers} update={update} />}
          {step === 3 && <Step3 answers={answers} update={update} />}
          {step === 4 && <Step4 answers={answers} update={update} />}
          {step === 5 && <Step5 answers={answers} update={update} />}
          {step === 6 && <Step6 answers={answers} update={update} />}
          {step === 7 && <Step7 revealing={revealing} revealed={revealed} matrix={matrix} answers={answers} />}
        </div>

        {/* CTA */}
        {!(step === 7 && !revealed) && (
          <div style={{ paddingTop:'20px' }}>
            {step === 7 && revealed
              ? <PillButton onClick={() => navigate('home')} style={{ width:'100%', padding:'16px' }}>Let's start →</PillButton>
              : step < 7
                ? <PillButton onClick={next} disabled={!canContinue()} style={{ width:'100%', padding:'16px' }}>
                    {step === 6 ? 'Find my match' : 'Continue'}
                  </PillButton>
                : null}
          </div>
        )}
      </div>
    </AppBackground>
  );
}

const DIET_TYPES = [

function Step6({ answers, update }) {

// ─── WORKOUT PLAYER ───────────────────────────────────────────────────────────
function WorkoutPlayerScreen({ navigate }) {
  const [exIdx, setExIdx] = useState(0);
  const [setsDone, setSetsDone] = useState(0);
  const [resting, setResting] = useState(false);
  const [timeLeft, setTimeLeft] = useState(0);
  const [done, setDone] = useState(false);
  const [weights, setWeights] = useState(EXERCISES.map(e => e.weight));
  const timerRef = useRef(null);

  const ex = EXERCISES[exIdx];
  const totalSets = ex.sets;
  const progress = (exIdx / EXERCISES.length) * 100 + (setsDone / (totalSets * EXERCISES.length)) * 100;

  const startRest = useCallback(() => {
    if (ex.rest === 0) {
      advanceSet();
      return;
    }
    setResting(true);
    setTimeLeft(ex.rest);
    timerRef.current = setInterval(() => {
      setTimeLeft(t => {
        if (t <= 1) {
          clearInterval(timerRef.current);
          setResting(false);
          advanceSet();
          return 0;
        }
        return t - 1;
      });
    }, 1000);
  }, [ex, setsDone, exIdx]);

  const advanceSet = useCallback(() => {
    setSetsDone(s => {
      const next = s + 1;
      if (next >= totalSets) {
        if (exIdx >= EXERCISES.length - 1) {
          setDone(true);
        } else {
          setExIdx(i => i + 1);
        }
        return 0;
      }
      return next;
    });
  }, [totalSets, exIdx]);

  const skipRest = () => {
    if (timerRef.current) clearInterval(timerRef.current);
    setResting(false);
    advanceSet();
  };

  useEffect(() => () => { if (timerRef.current) clearInterval(timerRef.current); }, []);

  if (done) {
    return (
      <AppBackground>
        <div style={{ minHeight:'100vh', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'40px 20px', textAlign:'center' }}>
          <div style={{ fontSize:'64px', marginBottom:'20px', animation:'badgePop 0.6s ease-out' }}>🎯</div>
          <div style={{ fontFamily:'Gilda Display', fontSize:'36px', color:'#3A1848', marginBottom:'8px' }}>Session complete!</div>
          <div style={{ fontFamily:'Outfit', fontSize:'14px', fontWeight:300, color:'rgba(152,120,184,0.7)', marginBottom:'8px' }}>You showed up, {USER.name}. That's everything.</div>
          <div style={{ fontFamily:'Gilda Display', fontSize:'15px', color:'rgba(152,120,184,0.8)', fontStyle:'italic', marginBottom:'32px' }}>
            "You're stronger than yesterday."
          </div>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'10px', width:'100%', marginBottom:'28px' }}>
            {[{l:'Exercises',v:EXERCISES.length},{l:'Sets',v:EXERCISES.reduce((a,e)=>a+e.sets,0)},{l:'Duration',v:`${TODAY_SESSION.duration}m`},{l:'Week',v:`${USER.programmeWeek}/${12}`}].map(s => (
              <GlassCard key={s.l} style={{ textAlign:'center' }}>
                <div style={{ fontFamily:'Gilda Display', fontSize:'28px', color:'#3A1848' }}>{s.v}</div>
                <div style={{ fontFamily:'Outfit', fontSize:'10px', textTransform:'uppercase', letterSpacing:'0.08em', color:'rgba(152,120,184,0.6)', marginTop:'4px' }}>{s.l}</div>
              </GlassCard>
            ))}
          </div>
          <PillButton onClick={() => navigate('home')} style={{ width:'100%', padding:'15px' }}>Back to home →</PillButton>
        </div>
      </AppBackground>
    );
  }

  return (
    <AppBackground>
      <div style={{ minHeight:'100vh', display:'flex', flexDirection:'column', padding:'0 20px 32px' }}>
        {/* Header */}
        <div style={{ display:'flex', alignItems:'center', gap:'12px', paddingTop:'52px', marginBottom:'16px' }}>
          <button onClick={() => navigate('home')} style={{ background:'rgba(255,255,255,0.4)', border:'none', borderRadius:'50%', width:'36px', height:'36px', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', backdropFilter:'blur(12px)' }}>
            <CloseIcon size={16} />
          </button>
          <div style={{ flex:1 }}>
            <div style={{ fontFamily:'Outfit', fontSize:'11px', color:'rgba(152,120,184,0.65)', marginBottom:'4px' }}>{TODAY_SESSION.name} · Week {TODAY_SESSION.week}</div>
            <div style={{ height:'4px', borderRadius:'2px', background:'rgba(255,255,255,0.4)', overflow:'hidden' }}>
              <div style={{ height:'100%', width:`${progress}%`, background:'#9878B8', borderRadius:'2px', transition:'width 0.4s ease' }} />
            </div>
          </div>
          <span style={{ fontFamily:'Outfit', fontSize:'12px', color:'rgba(152,120,184,0.65)' }}>{exIdx+1}/{EXERCISES.length}</span>
        </div>

        {/* Rest timer overlay */}
        {resting ? (
          <div className="scaleIn" style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:'16px' }}>
            <div style={{ fontFamily:'Outfit', fontSize:'13px', fontWeight:500, textTransform:'uppercase', letterSpacing:'0.1em', color:'rgba(152,120,184,0.7)' }}>Rest</div>
            <div style={{ fontFamily:'Gilda Display', fontSize:'80px', color:'#3A1848', lineHeight:1, animation:'timerTick 1s ease-in-out infinite' }}>{timeLeft}</div>
            <div style={{ fontFamily:'Outfit', fontSize:'14px', color:'rgba(152,120,184,0.6)' }}>seconds</div>
            <div style={{ fontFamily:'Outfit', fontSize:'12px', fontWeight:300, color:'rgba(152,120,184,0.6)', textAlign:'center', maxWidth:'220px', fontStyle:'italic' }}>"{ex.tip}"</div>
            <PillButton variant="ghost" onClick={skipRest} style={{ marginTop:'16px' }}>Skip rest</PillButton>
          </div>
        ) : (
          <div style={{ flex:1, display:'flex', flexDirection:'column' }}>
            {/* Exercise name */}
            <div style={{ marginBottom:'20px' }}>
              <div style={{ fontFamily:'Gilda Display', fontSize:'36px', color:'#3A1848', lineHeight:1.2, marginBottom:'6px' }}>{ex.name}</div>
              <div style={{ fontFamily:'Outfit', fontSize:'13px', color:'rgba(152,120,184,0.7)', fontStyle:'italic' }}>{ex.tip}</div>
            </div>

            {/* Set progress */}
            <div style={{ display:'flex', gap:'6px', marginBottom:'20px' }}>
              {Array.from({length:totalSets}).map((_,i) => (
                <div key={i} style={{ flex:1, height:'4px', borderRadius:'2px', background: i < setsDone ? '#9878B8' : 'rgba(255,255,255,0.5)' }} />
              ))}
            </div>
            <div style={{ fontFamily:'Outfit', fontSize:'12px', color:'rgba(152,120,184,0.65)', marginBottom:'20px' }}>
              Set {setsDone + 1} of {totalSets}
            </div>

            {/* Set / Rep / Weight grid */}
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:'10px', marginBottom:'24px' }}>
              {[{label:'Sets', value:`${setsDone+1}/${totalSets}`, sub:'current'},
                {label:'Reps', value: ex.reps > 0 ? ex.reps : '—', sub: ex.reps > 0 ? 'target' : 'hold'},
                {label:'Weight', value: weights[exIdx] > 0 ? weights[exIdx] : 'BW', sub: weights[exIdx] > 0 ? 'kg' : 'bodyweight'}].map(s => (
                <GlassCard key={s.label} strong style={{ textAlign:'center', padding:'16px 10px' }}>
                  <div style={{ fontFamily:'Gilda Display', fontSize:'30px', color:'#3A1848', lineHeight:1 }}>{s.value}</div>
                  <div style={{ fontFamily:'Outfit', fontSize:'9px', textTransform:'uppercase', letterSpacing:'0.07em', color:'rgba(152,120,184,0.55)', marginTop:'4px' }}>{s.sub}</div>
                  <div style={{ fontFamily:'Outfit', fontSize:'11px', fontWeight:500, color:'rgba(152,120,184,0.7)', marginTop:'2px' }}>{s.label}</div>
                </GlassCard>
              ))}
            </div>

            {/* Weight adjust */}
            {ex.weight > 0 && (
              <GlassCard style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'20px', padding:'12px 16px' }}>
                <span style={{ fontFamily:'Outfit', fontSize:'12px', color:'rgba(152,120,184,0.7)' }}>Adjust weight</span>
                <div style={{ display:'flex', alignItems:'center', gap:'14px' }}>
                  <button onClick={() => setWeights(w => { const n=[...w]; n[exIdx]=Math.max(0,n[exIdx]-2.5); return n; })} style={{ width:'32px', height:'32px', borderRadius:'50%', background:'rgba(255,255,255,0.5)', border:'0.5px solid rgba(200,184,232,0.4)', fontFamily:'Outfit', fontSize:'18px', cursor:'pointer', color:'#9878B8' }}>−</button>
                  <span style={{ fontFamily:'Gilda Display', fontSize:'20px', color:'#3A1848', minWidth:'40px', textAlign:'center' }}>{weights[exIdx]}kg</span>
                  <button onClick={() => setWeights(w => { const n=[...w]; n[exIdx]=n[exIdx]+2.5; return n; })} style={{ width:'32px', height:'32px', borderRadius:'50%', background:'rgba(255,255,255,0.5)', border:'0.5px solid rgba(200,184,232,0.4)', fontFamily:'Outfit', fontSize:'18px', cursor:'pointer', color:'#9878B8' }}>+</button>
                </div>
              </GlassCard>
            )}

            {/* Next exercise preview */}
            {exIdx < EXERCISES.length - 1 && (
              <GlassCard style={{ marginBottom:'20px', display:'flex', alignItems:'center', gap:'10px', padding:'10px 14px' }}>
                <div style={{ fontFamily:'Outfit', fontSize:'10px', fontWeight:500, textTransform:'uppercase', letterSpacing:'0.08em', color:'rgba(152,120,184,0.55)', flexShrink:0 }}>Up next</div>
                <div style={{ flex:1, fontFamily:'Outfit', fontSize:'13px', color:'#3A1848' }}>{EXERCISES[exIdx+1].name}</div>
                <div style={{ fontFamily:'Outfit', fontSize:'11px', color:'rgba(152,120,184,0.6)' }}>{EXERCISES[exIdx+1].sets}×{EXERCISES[exIdx+1].reps}</div>
              </GlassCard>
            )}

            <div style={{ marginTop:'auto' }}>
              <PillButton onClick={startRest} style={{ width:'100%', padding:'16px', fontSize:'14px' }}>
                {ex.rest > 0 ? `Complete set → Rest ${ex.rest}s` : 'Complete set →'}
              </PillButton>
            </div>
          </div>
        )}
      </div>
    </AppBackground>
  );
}

];

const MEAL_SLOTS = [
  { id:'breakfast', label:'Breakfast',       hours:[6,10] },
  { id:'lunch',     label:'Lunch',           hours:[11,14] },
  { id:'dinner',    label:'Dinner',          hours:[17,21] },
  { id:'snack',     label:'Snacks & Other',  hours:[] },
];

function getMealSlot() {
  const h = new Date().getHours();
  if (h >= 6  && h < 11) return 'breakfast';
  if (h >= 11 && h < 15) return 'lunch';
  if (h >= 17 && h < 22) return 'dinner';
  return 'snack';
}

function NutritionScreen({ navigate }) {
  const [tab, setTab] = useState('log');
  const [dietFilter, setDietFilter] = useState('All');
  const [selectedMeal, setSelectedMeal] = useState(null);
  const [kitchenLogged, setKitchenLogged] = useState([]);
  const [searchQ, setSearchQ] = useState('');
  // AI logger state
  const [aiInput, setAiInput] = useState('');
  const [aiState, setAiState] = useState('idle'); // idle | thinking | review
  const [parsedItems, setParsedItems] = useState([]);
  const [loggedItems, setLoggedItems] = useState(() =>
    MEALS_TODAY.map(m => ({ ...m, _id: m.id, slot: m.time < '11:00' ? 'breakfast' : m.time < '15:00' ? 'lunch' : 'snack', time: m.time }))
  );

  const totals = loggedItems.reduce((a,m) => ({ kcal:a.kcal+m.kcal, protein:a.protein+m.protein, carbs:a.carbs+m.carbs, fat:a.fat+m.fat }), { kcal:0, protein:0, carbs:0, fat:0 });
  const targets = { kcal:USER.macros.kcalTarget, protein:USER.macros.proteinTarget, carbs:USER.macros.carbsTarget, fat:USER.macros.fatTarget };

  const submitAI = (inputText) => {
    const t = (inputText || aiInput).trim();
    if (!t) return;
    setAiState('thinking');
    setTimeout(() => {
      const items = parseFood(t);
      if (items.length === 0) {
        setParsedItems([{ id: Date.now(), name: t, kcal:150, protein:8, carbs:15, fat:6, emoji:'🍽️', estimated:true, displayQty:1 }]);
      } else {
        setParsedItems(items);
      }
      setAiState('review');
    }, 700);
  };

  const confirmLog = () => {
    const now = new Date();
    const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    const slot = getMealSlot();
    const newItems = parsedItems.map(item => ({ ...item, _id: Date.now()+Math.random(), slot, time: timeStr }));
    setLoggedItems(prev => [...prev, ...newItems]);
    setParsedItems([]);
    setAiInput('');
    setAiState('idle');
    // Save to Supabase
    supabase.auth.getSession().then(({ data: { session } }) => {
      if (session) {
        newItems.forEach(item => {
          supabase.from('rosa_nutrition_logs').insert({ user_id: session.user.id, meal_name: item.name, kcal: item.kcal, protein: item.protein, carbs: item.carbs, fat: item.fat, portions: item.displayQty || 1 });
        });
      }
    });
  };

  const removeLogged = (id) => setLoggedItems(prev => prev.filter(m => m._id !== id));
  const updateParsedQty = (id, delta) => {
    setParsedItems(prev => prev.map(item => {
      if (item.id !== id) return item;
      const newQty = Math.max(0.5, (item.displayQty || 1) + delta);
      const ratio = newQty / (item.displayQty || 1);
      return { ...item, displayQty:newQty, kcal:Math.round(item.kcal*ratio), protein:Math.round(item.protein*ratio*10)/10, carbs:Math.round(item.carbs*ratio*10)/10, fat:Math.round(item.fat*ratio*10)/10 };
    }));
  };

  const dietOpts = ['All','Vegan','Vegetarian','Pescetarian','Omnivore'];
  const filtered = KITCHEN_MEALS.filter(m => {
    const dMatch = dietFilter === 'All' || m.diet.includes(dietFilter.toLowerCase());
    const sMatch = !searchQ || m.name.toLowerCase().includes(searchQ.toLowerCase());
    return dMatch && sMatch;
  });

  if (selectedMeal) {
    return <MealDetail meal={selectedMeal} onBack={() => setSelectedMeal(null)}
      onLog={() => {
        const now = new Date();
        const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        setLoggedItems(l => [...l, { ...selectedMeal, _id: Date.now(), slot: getMealSlot(), time: timeStr }]);
        setKitchenLogged(l => [...l, selectedMeal.id]);
        setSelectedMeal(null);
      }}
      logged={kitchenLogged.includes(selectedMeal.id)} />;
  }

  const pct = (v,t) => Math.min(100, Math.round((v/(t||1))*100));
  const remaining = targets.kcal - totals.kcal;
  const overTarget = remaining < 0;

  return (
    <AppBackground>
      <Screen withNav>
        <div style={{ paddingTop:'56px', marginBottom:'16px' }}>

              <span style={{ fontFamily:'Outfit', fontSize:'12px', color:'rgba(152,120,184,0.6)', marginLeft:'5px' }}>/ {targets.kcal} kcal</span>
            </div>

            <div style={{ height:'100%', width:`${pct(totals.kcal,targets.kcal)}%`, background: overTarget ? 'linear-gradient(90deg,#e05c7a,#f8a0b4)' : 'linear-gradient(90deg,#C8B8E8,#F8D0E4)', borderRadius:'4px', transition:'width 0.6s ease' }} />
          </div>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:'8px' }}>
            {[{l:'Protein',v:totals.protein,t:targets.protein,c:'#C8B8E8',u:'g'},{l:'Carbs',v:totals.carbs,t:targets.carbs,c:'#DDD5F5',u:'g'},{l:'Fat',v:totals.fat,t:targets.fat,c:'#F8D0E4',u:'g'}].map(m => (
              <div key={m.l}>

        {/* Tabs */}
        <div style={{ display:'flex', borderRadius:'24px', background:'rgba(255,255,255,0.4)', padding:'3px', marginBottom:'16px' }}>
          {[{id:'log',label:'🤖 Log food'},{id:'kitchen',label:'ROSA Kitchen'}].map(t => (
            <button key={t.id} onClick={() => setTab(t.id)}
              style={{ flex:1, padding:'9px', borderRadius:'20px', fontFamily:'Outfit', fontSize:'12px', fontWeight:500, cursor:'pointer', background: tab===t.id ? '#9878B8' : 'transparent', color: tab===t.id ? '#F2EEFB' : 'rgba(152,120,184,0.7)', border:'none', transition:'all 0.2s' }}>
              {t.label}
            </button>
          ))}
        </div>

        {tab === 'log' ? (
          <CalorieLogTab aiInput={aiInput} setAiInput={setAiInput} aiState={aiState} parsedItems={parsedItems}
            onSubmit={submitAI} onConfirm={confirmLog} onCancel={() => { setParsedItems([]); setAiState('idle'); }}
            onUpdateQty={updateParsedQty} loggedItems={loggedItems} onRemove={removeLogged} />
        ) : (
          <KitchenTab dietFilter={dietFilter} setDietFilter={setDietFilter} dietOpts={dietOpts} filtered={filtered}
            searchQ={searchQ} setSearchQ={setSearchQ} setSelectedMeal={setSelectedMeal} loggedMeals={kitchenLogged} />
        )}
      </Screen>
      <BottomNav active="nutrition" navigate={navigate} />
    </AppBackground>
  );
}

function CalorieLogTab({ aiInput, setAiInput, aiState, parsedItems, onSubmit, onConfirm, onCancel, onUpdateQty, loggedItems, onRemove }) {

  const handleKey = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); onSubmit(); } };

  const grouped = MEAL_SLOTS.map(slot => ({
    ...slot,
    items: loggedItems.filter(m => m.slot === slot.id),
  })).filter(s => s.items.length > 0);

  return (
    <div>
      {/* AI input card */}
      <GlassCard strong style={{ marginBottom:'12px', padding:'14px' }}>

          <div>
            <div style={{ fontFamily:'Outfit', fontSize:'12px', fontWeight:600, color:'#3A1848' }}>Tell Rosa what you ate</div>
            <div style={{ fontFamily:'Outfit', fontSize:'10px', color:'rgba(152,120,184,0.6)' }}>Type naturally — "2 eggs on toast with a latte"</div>

          disabled={aiState !== 'idle'}

          disabled={!aiInput.trim() || aiState !== 'idle'}

      {aiState === 'idle' && (
        <div style={{ marginBottom:'16px' }}>

          <div style={{ display:'flex', flexWrap:'wrap', gap:'6px' }}>
            {QUICK_FOODS.map(f => (
              <button key={f.label} onClick={() => onSubmit(f.text)}

                {f.label}
              </button>
            ))}
          </div>
        </div>
      )}

      {/* Review parsed items */}
      {aiState === 'review' && parsedItems.length > 0 && (
        <GlassCard style={{ marginBottom:'16px', padding:'14px' }}>
          <div style={{ fontFamily:'Outfit', fontSize:'11px', fontWeight:600, textTransform:'uppercase', letterSpacing:'0.1em', color:'rgba(152,120,184,0.6)', marginBottom:'10px' }}>Rosa found {parsedItems.length} item{parsedItems.length>1?'s':''}</div>
          <div style={{ display:'flex', flexDirection:'column', gap:'8px', marginBottom:'12px' }}>
            {parsedItems.map(item => (
              <div key={item.id} style={{ display:'flex', alignItems:'center', gap:'10px', padding:'10px 12px', borderRadius:'12px', background:'rgba(255,255,255,0.45)', border:'0.5px solid rgba(200,184,232,0.2)' }}>
                <div style={{ fontSize:'22px', flexShrink:0 }}>{item.emoji}</div>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontFamily:'Outfit', fontSize:'12px', fontWeight:500, color:'#3A1848', textTransform:'capitalize' }}>{item.name}</div>
                  <div style={{ fontFamily:'Outfit', fontSize:'10px', color:'rgba(152,120,184,0.65)', marginTop:'1px' }}>
                    {item.kcal} kcal · {item.protein}g P · {item.carbs}g C · {item.fat}g F
                    {item.estimated && <span style={{ color:'rgba(152,120,184,0.45)' }}> (est.)</span>}

                </div>
                <div style={{ display:'flex', alignItems:'center', gap:'6px', flexShrink:0 }}>

          <div style={{ padding:'8px 12px', borderRadius:'10px', background:'rgba(200,184,232,0.15)', marginBottom:'12px' }}>

          </div>
          <div style={{ display:'flex', gap:'8px' }}>

          </div>
        </GlassCard>
      )}

      {/* Logged meals grouped by meal slot */}
      {grouped.length > 0 ? grouped.map(slot => (

          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'8px' }}>

            {slot.items.map(m => (

                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontFamily:'Outfit', fontSize:'13px', fontWeight:500, color:'#3A1848', textTransform:'capitalize', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{m.name}</div>
                  <div style={{ fontFamily:'Outfit', fontSize:'10px', color:'rgba(152,120,184,0.65)', marginTop:'1px' }}>{m.time} · {m.protein}g prot</div>

                <div style={{ textAlign:'right', flexShrink:0 }}>
                  <div style={{ fontFamily:'Gilda Display', fontSize:'16px', color:'#3A1848' }}>{m.kcal}</div>
                  <div style={{ fontFamily:'Outfit', fontSize:'9px', color:'rgba(152,120,184,0.5)' }}>kcal</div>
                </div>
                <button onClick={() => onRemove(m._id)} style={{ width:'24px', height:'24px', borderRadius:'50%', background:'rgba(200,184,232,0.2)', border:'none', fontSize:'12px', color:'rgba(152,120,184,0.5)', cursor:'pointer', flexShrink:0 }}>×</button>
              </div>
            ))}
          </div>
        </div>
      )) : (
        <GlassCard style={{ textAlign:'center', padding:'24px' }}>
          <div style={{ fontSize:'32px', marginBottom:'8px' }}>🌸</div>
          <div style={{ fontFamily:'Gilda Display', fontSize:'15px', color:'rgba(152,120,184,0.7)', fontStyle:'italic' }}>"What have you eaten today? Tell me and I'll track it for you."</div>
          <div style={{ fontFamily:'Outfit', fontSize:'11px', color:'rgba(152,120,184,0.45)', marginTop:'6px' }}>— Rosa</div>
        </GlassCard>
      )}
    </div>
  );

          {/* Portions */}
          <GlassCard style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'16px', padding:'12px 16px' }}>

              <span style={{ fontFamily:'Gilda Display', fontSize:'22px', color:'#3A1848', minWidth:'32px', textAlign:'center' }}>{portions}</span>
              <button onClick={() => setPortions(p => p+0.5)} style={{ width:'32px', height:'32px', borderRadius:'50%', background:'rgba(255,255,255,0.5)', border:'0.5px solid rgba(200,184,232,0.4)', fontFamily:'Outfit', fontSize:'18px', cursor:'pointer', color:'#9878B8' }}>+</button>
            </div>
          </GlassCard>

          {/* Ingredients */}
          <SectionHeader>Ingredients</SectionHeader>
          <GlassCard style={{ marginBottom:'16px' }}>
            {meal.ingredients.map((ing, i) => (
              <div key={i} style={{ display:'flex', alignItems:'center', gap:'10px', padding:'8px 0', borderBottom: i < meal.ingredients.length-1 ? '0.5px solid rgba(200,184,232,0.2)' : 'none' }}>

          <PillButton onClick={onLog} disabled={logged} style={{ width:'100%', padding:'14px' }} variant={logged ? 'secondary' : 'primary'}>

          </PillButton>
        </div>
      </div>
    </AppBackground>
  );
}

// ─── DEV TEST MODE BUTTON ─────────────────────────────────────────────────────
const ALL_SCREENS = ['splash','terms','auth','onboarding','home','programmes','programme_detail','workout','nutrition','progress','profile'];

function DevTestButton({ screen, navigate }) {
  const [open, setOpen] = useState(false);
  const [touring, setTouring] = useState(false);
  const tourRef = useRef(null);

  const startTour = () => {
    setOpen(false);
    setTouring(true);
    const stops = ['splash','terms','onboarding','home','programmes','workout','nutrition','progress','profile'];
    let i = 0;
    const tick = () => {
      if (i >= stops.length) { setTouring(false); return; }
      navigate(stops[i++]);
      tourRef.current = setTimeout(tick, 2500);
    };
    tick();
  };

  useEffect(() => () => clearTimeout(tourRef.current), []);

  return (
    <div style={{ position:'fixed', bottom:'90px', right:'16px', zIndex:9999, display:'flex', flexDirection:'column', alignItems:'flex-end', gap:'8px' }}>
      {open && (
        <div style={{ background:'rgba(58,24,72,0.92)', backdropFilter:'blur(12px)', borderRadius:'14px', padding:'10px 0', minWidth:'170px', boxShadow:'0 8px 32px rgba(0,0,0,0.3)' }}>
          <div style={{ fontFamily:'Outfit', fontSize:'10px', fontWeight:600, textTransform:'uppercase', letterSpacing:'0.12em', color:'rgba(200,184,232,0.5)', padding:'0 14px 8px' }}>Jump to screen</div>
          {ALL_SCREENS.map(s => (
            <button key={s} onClick={() => { navigate(s); setOpen(false); }}
              style={{ display:'block', width:'100%', textAlign:'left', fontFamily:'Outfit', fontSize:'12px', color: s === screen ? '#C8B8E8' : 'rgba(255,255,255,0.75)', background: s === screen ? 'rgba(200,184,232,0.15)' : 'none', border:'none', padding:'7px 14px', cursor:'pointer', fontWeight: s === screen ? 600 : 400 }}>
              {s === screen ? '▶ ' : ''}{s}
            </button>
          ))}
          <div style={{ height:'0.5px', background:'rgba(200,184,232,0.2)', margin:'8px 0' }} />
          <button onClick={startTour}
            style={{ display:'block', width:'100%', textAlign:'left', fontFamily:'Outfit', fontSize:'12px', color:'#E8C8D8', background:'none', border:'none', padding:'7px 14px', cursor:'pointer', fontWeight:500 }}>
            🎬 Auto-tour (2.5s each)
          </button>
        </div>
      )}
      <button onClick={() => setOpen(o => !o)}
        style={{ fontFamily:'Outfit', fontSize:'11px', fontWeight:600, background: touring ? 'rgba(232,100,100,0.9)' : 'rgba(58,24,72,0.85)', color:'white', border:'none', borderRadius:'20px', padding:'7px 14px', cursor:'pointer', backdropFilter:'blur(8px)', boxShadow:'0 4px 16px rgba(0,0,0,0.25)', letterSpacing:'0.04em' }}>
        {touring ? '⏹ Stop tour' : '🎬 Dev'}
      </button>
    </div>
  );
}

// ─── ROOT APP ─────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState('splash');
  const [params, setParams] = useState({});
  const [consentData, setConsentData] = useState(null);
  const [authChecked, setAuthChecked] = useState(false);

  // Check existing Supabase session on load
  useEffect(() => {
    supabase.auth.getSession().then(async ({ data: { session } }) => {
      if (session) {
        const { data: profile } = await supabase.from('profiles').select('onboarding_complete').eq('id', session.user.id).single();
        setScreen(profile?.onboarding_complete ? 'home' : 'onboarding');
      }
      setAuthChecked(true);
    });

    const { data: { subscription } } = supabase.auth.onAuthStateChange(async (_event, session) => {
      if (session && screen === 'auth') {
        const { data: profile } = await supabase.from('profiles').select('onboarding_complete').eq('id', session.user.id).single();
        setScreen(profile?.onboarding_complete ? 'home' : 'onboarding');
      }
    });

    return () => subscription.unsubscribe();
  }, []);

  const navigate = (dest, p = {}) => {
    setParams(p);
    setScreen(dest);
    window.scrollTo(0, 0);
  };

  const handleTermsAccept = (consent) => {
    setConsentData(consent);
    navigate('auth');
  };

  if (!authChecked) {
    return (
      <AppBackground>
        <div style={{ minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center' }}>
          <div style={{ fontFamily:'Gilda Display', fontSize:'48px', color:'#3A1848', letterSpacing:'0.06em', animation:'pulse 1.5s ease-in-out infinite' }}>ROSA</div>
        </div>
      </AppBackground>
    );
  }

  const screenEl = (() => {
    switch (screen) {
      case 'splash':         return <SplashScreen navigate={navigate} />;
      case 'terms':          return <TermsScreen onAccept={handleTermsAccept} />;
      case 'auth':           return <AuthScreen navigate={navigate} consentData={consentData} />;
      case 'onboarding':     return <OnboardingScreen navigate={navigate} />;
      case 'home':           return <HomeScreen navigate={navigate} />;
      case 'programmes':     return <ProgrammesScreen navigate={navigate} />;
      case 'programme_detail': return <ProgrammeDetailScreen navigate={navigate} params={params} />;
      case 'workout':        return <WorkoutPlayerScreen navigate={navigate} />;
      case 'nutrition':      return <NutritionScreen navigate={navigate} />;
      case 'progress':       return <ProgressScreen navigate={navigate} />;
      case 'profile':        return <ProfileScreen navigate={navigate} />;
      default:               return <SplashScreen navigate={navigate} />;
    }
  })();

  return (
    <>
      {screenEl}
      <DevTestButton screen={screen} navigate={navigate} />
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

</script>
